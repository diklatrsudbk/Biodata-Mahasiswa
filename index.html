<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Registrasi Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .input-field { border: 1px solid #d1d5db; padding: 0.5rem; border-radius: 0.375rem; width: 100%; }
        .label-text { font-weight: 600; font-size: 0.875rem; color: #374151; margin-bottom: 0.25rem; display: block; }
    </style>
</head>
<body class="bg-gray-50 py-10" x-data="app()">

    <div class="max-w-5xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden">
        <div class="bg-blue-700 p-6 text-white text-center">
            <h1 class="text-2xl font-bold" x-text="'PENDAFTARAN ' + config.targetSheet"></h1>
            <p class="text-blue-100 text-sm mt-1">Lengkapi data institusi dan biodata peserta didik</p>
        </div>

        <form @submit.prevent="handleSubmit" class="p-8">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 bg-gray-50 p-6 rounded-lg border border-gray-200">
                <div>
                    <label class="label-text">Bagian</label>
                    <select x-model="formData.bagian" class="input-field" required>
                        <option value="">-- Pilih Bagian --</option>
                        <option>Pelayanan Medik</option>
                        <option>Penunjang Medik</option>
                        <option>Umum</option>
                    </select>
                </div>
                <div>
                    <label class="label-text">Jenis Kegiatan</label>
                    <select x-model="formData.jenis" class="input-field" required>
                        <option value="">-- Pilih Jenis --</option>
                        <option>PKL</option><option>PBL</option><option>Penelitian</option><option>Magang</option><option>Resident</option>
                    </select>
                </div>
                <div>
                    <label class="label-text">Tipe Pendaftaran</label>
                    <select x-model="formData.tipe" class="input-field" required @change="resetKelompok">
                        <option value="Perorangan">Perorangan / Mandiri</option>
                        <option value="Kelompok">Kelompok</option>
                    </select>
                </div>
            </div>

            <div class="mb-10">
                <h2 class="text-lg font-bold text-gray-700 mb-4 border-b">1. Data Institusi & Periode</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div><label class="label-text">Nama Institusi</label><input type="text" x-model="formData.namaInstitusi" class="input-field" required></div>
                    <div><label class="label-text">Jurusan</label><input type="text" x-model="formData.jurusan" class="input-field" required></div>
                    <div><label class="label-text">Kota Institusi</label><input type="text" x-model="formData.kota" class="input-field" required></div>
                    <div>
                        <label class="label-text">Jenjang</label>
                        <select x-model="formData.jenjangPendidikan" class="input-field" required>
                            <option>SMA/SMK</option><option>D3</option><option>D4</option><option>S1</option><option>S2</option><option>S3</option><option>Profesi</option>
                        </select>
                    </div>
                    <div><label class="label-text">Start Date</label><input type="date" x-model="formData.startDate" class="input-field" required></div>
                    <div><label class="label-text">End Date</label><input type="date" x-model="formData.endDate" @change="validateDates" class="input-field" required></div>
                </div>
            </div>

            <template x-if="formData.tipe === 'Perorangan'">
                <div class="mb-10">
                    <h2 class="text-lg font-bold text-gray-700 mb-4 border-b">2. Biodata & Berkas</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div class="lg:col-span-2"><label class="label-text">Nama Lengkap</label><input type="text" x-model="formData.nama" class="input-field" required></div>
                        <div><label class="label-text">NIM</label><input type="text" x-model="formData.nim" class="input-field" required></div>
                        <div><label class="label-text">KTP</label><input type="number" x-model="formData.ktp" class="input-field" required></div>
                        <div><label class="label-text">WA/HP</label><input type="text" x-model="formData.hp" class="input-field" required></div>
                        <div><label class="label-text">Tgl Lahir</label><input type="date" x-model="formData.tanggalLahir" @change="validateAge" class="input-field" required></div>
                        <div><label class="label-text">Pas Foto (JPG/PNG)</label><input type="file" @change="handleFile($event, formData, false)" class="text-sm"></div>
                        <div class="lg:col-span-2"><label class="label-text">Dokumen Pendukung (Bisa banyak file)</label><input type="file" multiple @change="handleFile($event, formData, true)" class="text-sm"></div>
                    </div>
                </div>
            </template>

            <template x-if="formData.tipe === 'Kelompok'">
                <div class="mb-10">
                    <h2 class="text-lg font-bold text-gray-700 mb-4 border-b">2. Daftar Anggota Kelompok</h2>
                    <div class="overflow-x-auto border rounded-lg">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="p-3">Data Mahasiswa</th>
                                    <th class="p-3">Upload File</th>
                                    <th class="p-3 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(mhs, index) in kelompok" :key="index">
                                    <tr class="border-t">
                                        <td class="p-3">
                                            <div class="grid grid-cols-2 gap-2">
                                                <input type="text" x-model="mhs.nama" placeholder="Nama" class="input-field" required>
                                                <input type="text" x-model="mhs.nim" placeholder="NIM" class="input-field" required>
                                                <input type="number" x-model="mhs.ktp" placeholder="KTP" class="input-field" required>
                                                <input type="text" x-model="mhs.hp" placeholder="WA" class="input-field" required>
                                            </div>
                                        </td>
                                        <td class="p-3">
                                            <label class="text-[10px] font-bold">Foto:</label>
                                            <input type="file" @change="handleFile($event, mhs, false)" class="block text-[10px] mb-2">
                                            <label class="text-[10px] font-bold">Dokumen:</label>
                                            <input type="file" multiple @change="handleFile($event, mhs, true)" class="block text-[10px]">
                                        </td>
                                        <td class="p-3 text-center">
                                            <button type="button" @click="removeMhs(index)" class="text-red-500 font-bold">Hapus</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    <button type="button" @click="addMhs" class="mt-4 text-blue-600 font-bold">+ Tambah Anggota</button>
                </div>
            </template>

            <button type="submit" class="w-full bg-blue-700 text-white font-bold py-4 rounded-lg hover:bg-blue-800 transition disabled:bg-gray-400" :disabled="loading">
                <span x-show="!loading">SUBMIT SEKARANG</span>
                <span x-show="loading">SEDANG MEMPROSES & MENGUNGGAH...</span>
            </button>
        </form>
    </div>

    <script>
        function app() {
            const initialForm = {
                tipe: 'Perorangan', bagian: '', jenis: 'Magang', namaInstitusi: '', jurusan: '', kota: '',
                jenjangPendidikan: '', level: '1', startDate: '', endDate: '', 
                nama: '', nim: '', ktp: '', hp: '', agama: 'Islam', jenisKelamin: 'Laki-Laki',
                tempatLahir: '', tanggalLahir: '', alamat: '', kelurahanKecamatan: '',
                pasFotoData: '', pasFotoType: '', dokumenList: []
            };

            return {
                config: {
                    targetSheet: "GEL5",
                    scriptUrl: "https://script.google.com/macros/s/AKfycby2o_XXEpjdh14jRQ3ScFWesbMGtAyN0hDCW00FO1u65EhHLTg-PpXlGXkrv57U4At0/exec"
                },
                loading: false,
                formData: { ...initialForm },
                kelompok: [{ nama: '', nim: '', hp: '', ktp: '', tanggalLahir: '', pasFotoData: '', pasFotoType: '', dokumenList: [] }],
                
                addMhs() { this.kelompok.push({ nama: '', nim: '', hp: '', ktp: '', tanggalLahir: '', pasFotoData: '', pasFotoType: '', dokumenList: [] }) },
                removeMhs(index) { if(this.kelompok.length > 1) this.kelompok.splice(index, 1) },
                resetKelompok() { this.kelompok = [{ nama: '', nim: '', hp: '', ktp: '', tanggalLahir: '', pasFotoData: '', pasFotoType: '', dokumenList: [] }] },

                handleFile(e, targetObj, isMulti) {
                    const files = e.target.files;
                    if (!files.length) return;

                    if (!isMulti) {
                        const reader = new FileReader();
                        reader.onload = (f) => {
                            targetObj.pasFotoData = f.target.result.split(',')[1];
                            targetObj.pasFotoType = files[0].type;
                        };
                        reader.readAsDataURL(files[0]);
                    } else {
                        targetObj.dokumenList = [];
                        Array.from(files).forEach(file => {
                            const reader = new FileReader();
                            reader.onload = (f) => {
                                targetObj.dokumenList.push({
                                    name: file.name,
                                    type: file.type,
                                    base64: f.target.result.split(',')[1]
                                });
                            };
                            reader.readAsDataURL(file);
                        });
                    }
                },

                validateAge() {
                    const age = new Date().getFullYear() - new Date(this.formData.tanggalLahir).getFullYear();
                    if (age < 14) { alert("Umur minimal 14 tahun!"); this.formData.tanggalLahir = ''; }
                },

                validateDates() {
                    if (new Date(this.formData.startDate) > new Date(this.formData.endDate)) {
                        alert("Start Date tidak boleh melewati End Date!"); this.formData.endDate = '';
                    }
                },

                async handleSubmit() {
                    this.loading = true;
                    try {
                        if (this.formData.tipe === 'Perorangan') {
                            await this.sendToAppsScript(this.formData);
                        } else {
                            for (let mhs of this.kelompok) {
                                let dataToSend = { ...this.formData, ...mhs };
                                await this.sendToAppsScript(dataToSend);
                            }
                        }
                        alert("Berhasil! Data dan File telah terunggah.");
                        window.location.reload(); 
                    } catch (e) {
                        alert("Gagal: " + e);
                    } finally {
                        this.loading = false;
                    }
                },

                async sendToAppsScript(payload) {
                    const body = new URLSearchParams();
                    body.append("targetSheet", this.config.targetSheet);
                    for (let key in payload) {
                        if (key === 'dokumenList') {
                            body.append(key, JSON.stringify(payload[key]));
                        } else if (payload[key]) {
                            body.append(key, payload[key]);
                        }
                    }
                    await fetch(this.config.scriptUrl, { method: 'POST', body: body, mode: 'no-cors' });
                }
            }
        }
    </script>
</body>
</html>
