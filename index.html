<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Peserta Didik 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; color: #495057; }
        [x-cloak] { display: none !important; }
        
        .input-field { 
            border: 1px solid #dee2e6; 
            padding: 0.75rem 1rem; 
            border-radius: 0.5rem; 
            width: 100%; 
            font-size: 0.95rem; 
            transition: all 0.2s ease;
            background-color: #ffffff;
        }
        .input-field:focus {
            border-color: #714B67;
            outline: none;
            box-shadow: 0 0 0 3px rgba(113, 75, 103, 0.1);
        }
        .label-text { 
            font-weight: 600; 
            font-size: 0.85rem; 
            color: #495057; 
            margin-bottom: 0.4rem; 
            display: block; 
        }
        .section-card {
            background: #ffffff;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            margin-bottom: 2rem;
        }
        .loading-state { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body class="py-12 px-4 antialiased" x-data="app()">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-12">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-[#714B67] rounded-2xl flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold text-[#212529] tracking-tight">Data Peserta Didik 2026</h1>
            <p class="text-gray-500 mt-2 font-medium" x-text="'Target Sheet: ' + config.targetSheet"></p>
        </div>

        <form @submit.prevent="handleSubmit" :class="loading ? 'loading-state' : ''">
            
            <div class="section-card">
                <h2 class="text-[#714B67] font-bold uppercase tracking-wider text-xs mb-6 border-b pb-3">I. Data Kegiatan & Institusi</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                    <div>
                        <label class="label-text">Bagian</label>
                        <select x-model="formData.bagian" class="input-field" required>
                            <option value="">-- Pilih --</option>
                            <option>Pelayanan Medik</option><option>Penunjang Medik</option><option>Umum</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-text">Jenis Kegiatan</label>
                        <select x-model="formData.jenis" class="input-field" required>
                            <option value="">-- Pilih --</option>
                            <option>PKL</option><option>PBL</option><option>Penelitian</option><option>Magang</option><option>Resident</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-text">Tipe Pendaftaran</label>
                        <select x-model="formData.tipe" class="input-field" required @change="resetKelompok">
                            <option value="Perorangan">Perorangan</option>
                            <option value="Kelompok">Kelompok</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-text">Level</label>
                        <select x-model="formData.level" class="input-field">
                            <option>1</option><option>2</option><option>3</option><option>4</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="label-text">Nama Institusi</label>
                        <input type="text" x-model="formData.namaInstitusi" class="input-field" placeholder="Nama Kampus/Sekolah" required>
                    </div>
                    <div>
                        <label class="label-text">Jurusan</label>
                        <input type="text" x-model="formData.jurusan" class="input-field" required>
                    </div>
                    <div>
                        <label class="label-text">Kota Institusi</label>
                        <input type="text" x-model="formData.kotaInstitusi" class="input-field" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="label-text">Tanggal Mulai</label>
                        <input type="date" x-model="formData.startDate" class="input-field" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="label-text">Tanggal Selesai</label>
                        <input type="date" x-model="formData.endDate" @change="validateDates" class="input-field" required>
                    </div>
                </div>
            </div>

            <template x-if="formData.tipe === 'Perorangan'">
                <div class="section-card">
                    <h2 class="text-[#714B67] font-bold uppercase tracking-wider text-xs mb-6 border-b pb-3">II. Biodata Mahasiswa</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="md:col-span-2"><label class="label-text">Nama Lengkap</label><input type="text" x-model="formData.nama" class="input-field" required></div>
                        <div><label class="label-text">NIM</label><input type="text" x-model="formData.nim" class="input-field" required></div>
                        <div><label class="label-text">No. KTP</label><input type="number" x-model="formData.ktp" class="input-field" required></div>
                        <div><label class="label-text">No. WhatsApp</label><input type="text" x-model="formData.hp" class="input-field" required></div>
                        <div><label class="label-text">Tempat Lahir</label><input type="text" x-model="formData.tempatLahir" class="input-field" required></div>
                        <div><label class="label-text">Tgl Lahir</label><input type="date" x-model="formData.tanggalLahir" @change="validateAge" class="input-field" required></div>
                        <div class="md:col-span-2"><label class="label-text">Alamat Lengkap</label><input type="text" x-model="formData.alamat" class="input-field" required></div>
                        <div><label class="label-text">Kelurahan-Kecamatan</label><input type="text" x-model="formData.kelurahanKecamatan" class="input-field" required></div>

                        <div class="md:col-span-1 bg-gray-50 p-4 rounded-lg border border-dashed"><label class="label-text">Pas Foto (JPG)</label><input type="file" accept=".jpg,.jpeg" @change="handleFile($event, formData, false)" class="text-xs"></div>
                        <div class="md:col-span-2 bg-gray-50 p-4 rounded-lg border border-dashed"><label class="label-text">Dokumen (PDF)</label><input type="file" accept=".pdf" multiple @change="handleFile($event, formData, true)" class="text-xs"></div>
                    </div>
                </div>
            </template>

            <template x-if="formData.tipe === 'Kelompok'">
                <div class="section-card" x-data="{ showForm: false, tempMhs: {} }">
                    <h2 class="text-[#714B67] font-bold uppercase tracking-wider text-xs mb-6 border-b pb-3">II. Daftar Anggota Kelompok</h2>
                    
                    <div class="overflow-x-auto border rounded-lg mb-6">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-gray-50 border-b">
                                <tr>
                                    <th class="p-3">Nama</th>
                                    <th class="p-3">NIM / KTP</th>
                                    <th class="p-3">Kontak</th>
                                    <th class="p-3 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-if="kelompok.length === 0">
                                    <tr><td colspan="4" class="p-8 text-center text-gray-400 italic">Belum ada anggota.</td></tr>
                                </template>
                                <template x-for="(mhs, index) in kelompok" :key="index">
                                    <tr class="border-t hover:bg-gray-50">
                                        <td class="p-3 font-semibold text-gray-800" x-text="mhs.nama"></td>
                                        <td class="p-3 text-gray-500" x-text="mhs.nim + ' / ' + mhs.ktp"></td>
                                        <td class="p-3 text-gray-500" x-text="mhs.hp"></td>
                                        <td class="p-3 text-center"><button type="button" @click="removeMhs(index)" class="text-red-500 font-bold">Hapus</button></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <button type="button" x-show="!showForm" @click="showForm = true; tempMhs = { agama: 'Islam', jenisKelamin: 'Laki-Laki', dokumenList: [] }" 
                        class="bg-white border-2 border-[#714B67] text-[#714B67] px-6 py-2 rounded-lg font-bold hover:bg-[#714B67] hover:text-white transition">+ Tambah Anggota</button>

                    <div x-show="showForm" x-cloak class="p-6 bg-[#fdfafc] border-2 border-[#714B67]/20 rounded-xl mt-4 shadow-sm">
                        <h3 class="font-bold text-[#714B67] mb-6 uppercase text-xs">Biodata Anggota Baru</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                            <div class="md:col-span-2"><label class="label-text">Nama Lengkap</label><input type="text" x-model="tempMhs.nama" class="input-field"></div>
                            <div><label class="label-text">NIM</label><input type="text" x-model="tempMhs.nim" class="input-field"></div>
                            <div><label class="label-text">No. KTP</label><input type="number" x-model="tempMhs.ktp" class="input-field"></div>
                            <div><label class="label-text">No. WA</label><input type="text" x-model="tempMhs.hp" class="input-field"></div>
                            <div><label class="label-text">Tempat Lahir</label><input type="text" x-model="tempMhs.tempatLahir" class="input-field"></div>
                            <div><label class="label-text">Tgl Lahir</label><input type="date" x-model="tempMhs.tanggalLahir" class="input-field"></div>
                            <div class="md:col-span-2"><label class="label-text">Alamat Lengkap</label><input type="text" x-model="tempMhs.alamat" class="input-field"></div>
                            <div><label class="label-text">Kelurahan-Kecamatan</label><input type="text" x-model="tempMhs.kelurahanKecamatan" class="input-field"></div>
                            <div class="bg-white p-3 border rounded-lg"><label class="label-text text-[#714B67]">Pas Foto (JPG)</label><input type="file" accept=".jpg,.jpeg" @change="handleFile($event, tempMhs, false)" class="text-xs"></div>
                            <div class="md:col-span-2 bg-white p-3 border rounded-lg"><label class="label-text text-[#714B67]">Dokumen (PDF)</label><input type="file" accept=".pdf" multiple @change="handleFile($event, tempMhs, true)" class="text-xs"></div>
                        </div>
                        <div class="mt-8 flex gap-3">
                            <button type="button" @click="if(tempMhs.nama && tempMhs.nim) { kelompok.push({...tempMhs}); showForm = false; } else { alert('Nama & NIM wajib diisi!') }" 
                                class="bg-[#714B67] text-white px-8 py-3 rounded-lg font-bold shadow-md">Simpan Anggota</button>
                            <button type="button" @click="showForm = false" class="bg-gray-200 text-gray-600 px-6 py-3 rounded-lg font-bold">Batal</button>
                        </div>
                    </div>
                    <p x-show="kelompok.length < 2" class="mt-4 text-red-500 text-xs font-semibold italic">* Minimal 2 anggota untuk pendaftaran kelompok.</p>
                </div>
            </template>

            <button type="submit" class="w-full bg-[#714B67] text-white font-bold py-5 rounded-xl shadow-lg hover:shadow-2xl transition-all transform hover:-translate-y-1 active:scale-[0.98] disabled:bg-gray-300 mt-4" :disabled="loading">
                <span x-show="!loading" class="text-lg tracking-wide">SUBMIT PENDAFTARAN</span>
                <div x-show="loading" class="flex flex-col items-center">
                    <span class="animate-pulse">SEDANG MENGIRIM DATA...</span>
                    <span class="text-[10px] font-normal mt-1 opacity-70" x-text="progressText"></span>
                </div>
            </button>
        </form>
    </div>

    <script>
        function app() {
            const initialForm = {
                tipe: 'Perorangan', bagian: '', jenis: 'Magang', namaInstitusi: '', jurusan: '', kotaInstitusi: '',
                jenjangPendidikan: 'S1', level: '1', startDate: '', endDate: '',  
                nama: '', nim: '', ktp: '', hp: '', agama: 'Islam', jenisKelamin: 'Laki-Laki',
                tempatLahir: '', tanggalLahir: '', alamat: '', kelurahanKecamatan: '',
                pasFotoData: '', pasFotoType: '', dokumenList: []
            };

            return {
                config: {
                    targetSheet: "GEL5",
                    scriptUrl: "https://script.google.com/macros/s/AKfycby2o_XXEpjdh14jRQ3ScFWesbMGtAyN0hDCW00FO1u65EhHLTg-PpXlGXkrv57U4At0/exec"
                },
                loading: false,
                progressText: '',
                formData: { ...initialForm },
                kelompok: [],
                resetKelompok() { this.kelompok = []; },
                removeMhs(index) { this.kelompok.splice(index, 1); },
                handleFile(e, targetObj, isMulti) {
                    const files = e.target.files;
                    if (!files.length) return;
                    if (!isMulti) {
                        const reader = new FileReader();
                        reader.onload = (f) => { targetObj.pasFotoData = f.target.result.split(',')[1]; targetObj.pasFotoType = files[0].type; };
                        reader.readAsDataURL(files[0]);
                    } else {
                        targetObj.dokumenList = [];
                        Array.from(files).forEach(file => {
                            const reader = new FileReader();
                            reader.onload = (f) => { targetObj.dokumenList.push({ name: file.name, type: file.type, base64: f.target.result.split(',')[1] }); };
                            reader.readAsAsDataURL(file);
                        });
                    }
                },
                validateAge() {
                    if(!this.formData.tanggalLahir) return;
                    const age = new Date().getFullYear() - new Date(this.formData.tanggalLahir).getFullYear();
                    if (age < 14) { alert("Umur minimal 14 tahun!"); this.formData.tanggalLahir = ''; }
                },
                validateDates() {
                    if (this.formData.startDate && this.formData.endDate) {
                        if (new Date(this.formData.startDate) > new Date(this.formData.endDate)) {
                            alert("Start Date tidak boleh melewati End Date!"); this.formData.endDate = '';
                        }
                    }
                },
                async handleSubmit() {
                    if (this.formData.tipe === 'Kelompok' && this.kelompok.length < 2) {
                        alert("Gagal: Pendaftaran kelompok harus minimal 2 orang anggota!");
                        return;
                    }
                    this.loading = true;
                    try {
                        if (this.formData.tipe === 'Perorangan') {
                            this.progressText = "Mengirim data...";
                            await this.sendToAppsScript(this.formData);
                        } else {
                            let total = this.kelompok.length;
                            for (let [index, mhs] of this.kelompok.entries()) {
                                this.progressText = `Anggota ${index + 1} dari ${total}...`;
                                let dataToSend = { ...this.formData, ...mhs };
                                await this.sendToAppsScript(dataToSend);
                            }
                        }
                        alert("Pendaftaran Berhasil Terkirim!");
                        window.location.reload(); 
                    } catch (e) {
                        alert("Gagal: " + e);
                        this.loading = false;
                    }
                },
                async sendToAppsScript(payload) {
                    const body = new FormData();
                    body.append("targetSheet", this.config.targetSheet);
                    for (let key in payload) {
                        if (key === 'dokumenList') {
                            body.append(key, JSON.stringify(payload[key]));
                        } else if (payload[key]) {
                            body.append(key, payload[key]);
                        }
                    }
                    await fetch(this.config.scriptUrl, { method: 'POST', body: body, mode: 'no-cors' });
                }
            }
        }
    </script>
</body>
</html>
