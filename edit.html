<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Peserta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-container { display: flex; gap: 5px; justify-content: center; }
        .table td { vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h3 class="mb-4 text-center text-danger">⚙️ Manajemen Data Peserta</h3>
    <div class="d-flex justify-content-between mb-3">
        <a href="index.html" class="btn btn-secondary">⬅️ Kembali</a>
        <input type="text" id="search" class="form-control w-50" placeholder="Cari Nama/NIM..." onkeyup="filter()">
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark text-center">
            <tr>
                <th>Nama</th>
                <th>NIM</th>
                <th>Sekolah</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="content">
            <tr><td colspan="4" class="text-center">Memuat data...</td></tr>
        </tbody>
    </table>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title">Edit Semua Data</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="fEdit">
                    <input type="hidden" id="e_old_nim">
                    <div class="mb-2"><label>Nama</label><input type="text" id="e_nama" class="form-control"></div>
                    <div class="mb-2"><label>NIM</label><input type="text" id="e_nim" class="form-control"></div>
                    <div class="mb-2"><label>No. KTP</label><input type="text" id="e_ktp" class="form-control"></div>
                    <div class="mb-2"><label>No. HP</label><input type="text" id="e_hp" class="form-control"></div>
                    <div class="mb-2"><label>Alamat</label><textarea id="e_alamat" class="form-control"></textarea></div>
                    <div class="mb-2"><label>Sekolah</label><input type="text" id="e_sekolah" class="form-control"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="saveBtn" class="btn btn-primary w-100" onclick="updateData()">Simpan Perubahan</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const url = 'https://script.google.com/macros/s/AKfycby2nDsO_MtPO-XET0E5zFhHHae0CL3DpqyOfGc1qXWMwBkMebo-Q-DrZWOJL2OPU0E/exec';
    let modal = new bootstrap.Modal(document.getElementById('editModal'));

    function load() {
        fetch(url + "?action=read").then(res => res.json()).then(data => {
            let html = "";
            data.forEach(d => {
                html += `<tr>
                    <td>${d.nama}</td>
                    <td>${d.nim}</td>
                    <td>${d.sekolah}</td>
                    <td>
                        <div class="btn-container">
                            <button class="btn btn-sm btn-warning" onclick="openEdit('${d.nama}','${d.nim}','${d.ktp}','${d.alamat}','${d.sekolah}','${d.hp}')">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="del('${d.nim}')">Hapus</button>
                        </div>
                    </td>
                </tr>`;
            });
            document.getElementById('content').innerHTML = html;
        });
    }

    function openEdit(nama, nim, ktp, alamat, sekolah, hp) {
        document.getElementById('e_old_nim').value = nim;
        document.getElementById('e_nama').value = nama;
        document.getElementById('e_nim').value = nim;
        document.getElementById('e_ktp').value = (ktp == "undefined" ? "" : ktp);
        document.getElementById('e_hp').value = (hp == "undefined" ? "" : hp);
        document.getElementById('e_alamat').value = (alamat == "undefined" ? "" : alamat);
        document.getElementById('e_sekolah').value = sekolah;
        modal.show();
    }

    function updateData() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; 
        btn.innerText = "Proses...";
        
        // Buat objek JSON, bukan FormData
        const payload = {
            action: 'update',
            nama: document.getElementById('e_nama').value,
            nim: document.getElementById('e_nim').value, // Ini NIM yang dicari di Sheet
            ktp: document.getElementById('e_ktp').value,
            hp: document.getElementById('e_hp').value,
            alamat: document.getElementById('e_alamat').value,
            sekolah: document.getElementById('e_sekolah').value
        };

        fetch(url, { 
            method: 'POST', 
            mode: 'no-cors', // Tambahkan ini untuk menghindari isu CORS
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload) 
        }).then(() => {
            alert("Data Berhasil Diupdate!"); 
            modal.hide(); 
            load();
            btn.disabled = false; 
            btn.innerText = "Simpan Perubahan";
        }).catch(err => {
            alert("Error: " + err);
            btn.disabled = false;
        });
    }

    function del(nim) {
        if(confirm("Yakin ingin menghapus data dengan NIM " + nim + "?")) {
            const payload = {
                action: 'delete',
                nim: nim
            };

            fetch(url, { 
                method: 'POST', 
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload) 
            }).then(() => { 
                alert("Data Berhasil Dihapus!"); 
                load(); 
            }).catch(err => {
                alert("Gagal menghapus: " + err);
            });
        }
    }

    function filter() {
        let val = document.getElementById("search").value.toLowerCase();
        let rows = document.querySelectorAll("#content tr");
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none");
    }

    window.onload = load;
</script>
</body>
</html>
