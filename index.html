<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Registrasi Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .input-field { border: 1px solid #d1d5db; padding: 0.4rem; border-radius: 0.375rem; width: 100%; font-size: 0.85rem; }
        .label-text { font-weight: 600; font-size: 0.75rem; color: #374151; margin-bottom: 0.15rem; display: block; }
        .loading-state { opacity: 0.6; pointer-events: none; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 py-8" x-data="app()">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden">
        <div class="bg-blue-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold" x-text="'REGISTRASI ' + config.targetSheet"></h1>
        </div>

        <form @submit.prevent="handleSubmit" class="p-6" :class="loading ? 'loading-state' : ''">
            
            <div class="mb-8 p-4 bg-blue-50 rounded-lg border border-blue-100">
                <h2 class="font-bold text-blue-800 mb-4 border-b border-blue-200 pb-2 uppercase text-sm">I. Data Kegiatan & Institusi</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="label-text">Bagian</label>
                        <select x-model="formData.bagian" class="input-field" required>
                            <option value="">-- Pilih --</option>
                            <option>Pelayanan Medik</option><option>Penunjang Medik</option><option>Umum</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-text">Jenis Kegiatan</label>
                        <select x-model="formData.jenis" class="input-field" required>
                            <option value="">-- Pilih --</option>
                            <option>PKL</option><option>PBL</option><option>Penelitian</option><option>Magang</option><option>Resident</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-text">Tipe Pendaftaran</label>
                        <select x-model="formData.tipe" class="input-field" required @change="resetKelompok">
                            <option value="Perorangan">Perorangan</option>
                            <option value="Kelompok">Kelompok</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-text">Level</label>
                        <select x-model="formData.level" class="input-field">
                            <option>1</option><option>2</option><option>3</option><option>4</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="label-text">Nama Institusi</label>
                        <input type="text" x-model="formData.namaInstitusi" class="input-field" required>
                    </div>
                    <div>
                        <label class="label-text">Jurusan</label>
                        <input type="text" x-model="formData.jurusan" class="input-field" required>
                    </div>
                    <div>
                        <label class="label-text">Kota (Institusi)</label>
                        <input type="text" x-model="formData.kotaInstitusi" class="input-field" required>
                    </div>
                    <div><label class="label-text">Start Date</label><input type="date" x-model="formData.startDate" class="input-field" required></div>
                    <div><label class="label-text">End Date</label><input type="date" x-model="formData.endDate" @change="validateDates" class="input-field" required></div>
                </div>
            </div>

            <template x-if="formData.tipe === 'Perorangan'">
                <div class="mb-8 p-4 bg-white border rounded-lg shadow-sm">
                    <h2 class="font-bold text-gray-700 mb-4 border-b pb-2 uppercase text-sm">II. Biodata Mahasiswa</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2"><label class="label-text">Nama Lengkap</label><input type="text" x-model="formData.nama" class="input-field" required></div>
                        <div><label class="label-text">NIM</label><input type="text" x-model="formData.nim" class="input-field" required></div>
                        <div><label class="label-text">No. KTP</label><input type="number" x-model="formData.ktp" class="input-field" required></div>
                        <div><label class="label-text">No. WA</label><input type="text" x-model="formData.hp" class="input-field" required></div>
                        <div><label class="label-text">Tempat Lahir</label><input type="text" x-model="formData.tempatLahir" class="input-field" required></div>
                        <div><label class="label-text">Tgl Lahir</label><input type="date" x-model="formData.tanggalLahir" @change="validateAge" class="input-field" required></div>
                        
                        <div class="md:col-span-2"><label class="label-text">Alamat Lengkap</label><input type="text" x-model="formData.alamat" class="input-field" required></div>
                        <div><label class="label-text">Kelurahan-Kecamatan</label><input type="text" x-model="formData.kelurahanKecamatan" class="input-field" required></div>

                        <div class="md:col-span-1"><label class="label-text">Pas Foto (JPG)</label><input type="file" accept=".jpg,.jpeg" @change="handleFile($event, formData, false)" class="text-xs"></div>
                        <div class="md:col-span-2"><label class="label-text">Dokumen (PDF)</label><input type="file" accept=".pdf" multiple @change="handleFile($event, formData, true)" class="text-xs"></div>
                    </div>
                </div>
            </template>

            <template x-if="formData.tipe === 'Kelompok'">
                <div class="mb-8" x-data="{ showForm: false, tempMhs: {} }">
                    <h2 class="font-bold text-gray-700 mb-4 border-b pb-2 uppercase text-sm">II. Daftar Anggota Kelompok</h2>
                    
                    <div class="overflow-x-auto border rounded-lg bg-gray-50 mb-4">
                        <table class="w-full text-[11px] text-left">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="p-2 border">Nama</th>
                                    <th class="p-2 border">NIM / KTP</th>
                                    <th class="p-2 border">Kontak</th>
                                    <th class="p-2 border text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-if="kelompok.length === 0">
                                    <tr><td colspan="4" class="p-4 text-center text-gray-400">Belum ada anggota. Klik "Tambah Anggota"</td></tr>
                                </template>
                                <template x-for="(mhs, index) in kelompok" :key="index">
                                    <tr class="border-t bg-white">
                                        <td class="p-2 border font-bold" x-text="mhs.nama"></td>
                                        <td class="p-2 border" x-text="mhs.nim + ' / ' + mhs.ktp"></td>
                                        <td class="p-2 border" x-text="mhs.hp"></td>
                                        <td class="p-2 border text-center">
                                            <button type="button" @click="removeMhs(index)" class="text-red-500 hover:font-bold">Hapus</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <button type="button" x-show="!showForm" @click="showForm = true; tempMhs = { agama: 'Islam', jenisKelamin: 'Laki-Laki', dokumenList: [] }" 
                        class="bg-green-600 text-white px-4 py-2 rounded text-xs hover:bg-green-700 transition">+ Tambah Anggota</button>

                    <div x-show="showForm" x-cloak class="p-6 border-2 border-green-200 rounded-xl bg-green-50 mt-4 shadow-md">
                        <h3 class="font-bold text-green-800 mb-4 uppercase text-xs">Form Biodata Anggota</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="md:col-span-2"><label class="label-text">Nama Lengkap</label><input type="text" x-model="tempMhs.nama" class="input-field"></div>
                            <div><label class="label-text">NIM</label><input type="text" x-model="tempMhs.nim" class="input-field"></div>
                            <div><label class="label-text">No. KTP</label><input type="number" x-model="tempMhs.ktp" class="input-field"></div>
                            <div><label class="label-text">No. WA</label><input type="text" x-model="tempMhs.hp" class="input-field"></div>
                            <div><label class="label-text">Tempat Lahir</label><input type="text" x-model="tempMhs.tempatLahir" class="input-field"></div>
                            <div><label class="label-text">Tgl Lahir</label><input type="date" x-model="tempMhs.tanggalLahir" class="input-field"></div>
                            
                            <div class="md:col-span-2"><label class="label-text">Alamat Lengkap</label><input type="text" x-model="tempMhs.alamat" class="input-field"></div>
                            <div><label class="label-text">Kelurahan-Kecamatan</label><input type="text" x-model="tempMhs.kelurahanKecamatan" class="input-field"></div>

                            <div class="md:col-span-1"><label class="label-text">Pas Foto (JPG)</label><input type="file" accept=".jpg,.jpeg" @change="handleFile($event, tempMhs, false)" class="text-[10px]"></div>
                            <div class="md:col-span-2"><label class="label-text">Dokumen (PDF)</label><input type="file" accept=".pdf" multiple @change="handleFile($event, tempMhs, true)" class="text-[10px]"></div>
                        </div>
                        <div class="mt-6 flex gap-2">
                            <button type="button" @click="if(tempMhs.nama && tempMhs.nim) { kelompok.push({...tempMhs}); showForm = false; } else { alert('Nama & NIM wajib diisi!') }" 
                                class="bg-blue-600 text-white px-6 py-2 rounded text-xs font-bold">SIMPAN KE DAFTAR</button>
                            <button type="button" @click="showForm = false" class="bg-gray-400 text-white px-4 py-2 rounded text-xs">BATAL</button>
                        </div>
                    </div>
                    
                    <p x-show="kelompok.length < 2" class="mt-3 text-red-500 text-[10px] italic font-semibold">* Minimal 2 anggota untuk pendaftaran kelompok.</p>
                </div>
            </template>

            <button type="submit" class="w-full bg-blue-700 text-white font-bold py-4 rounded-lg hover:bg-blue-900 transition disabled:bg-gray-400 mt-4" :disabled="loading">
                <span x-show="!loading">SUBMIT PENDAFTARAN</span>
                <div x-show="loading" class="flex flex-col items-center">
                    <span class="animate-pulse">SEDANG MENGIRIM DATA...</span>
                    <span class="text-xs font-normal mt-1" x-text="progressText"></span>
                </div>
            </button>
        </form>
    </div>

    <script>
        function app() {
            const initialForm = {
                tipe: 'Perorangan', bagian: '', jenis: 'Magang', namaInstitusi: '', jurusan: '', kotaInstitusi: '',
                jenjangPendidikan: 'S1', level: '1', startDate: '', endDate: '',  
                nama: '', nim: '', ktp: '', hp: '', agama: 'Islam', jenisKelamin: 'Laki-Laki',
                tempatLahir: '', tanggalLahir: '', alamat: '', kelurahanKecamatan: '',
                pasFotoData: '', pasFotoType: '', dokumenList: []
            };

            return {
                config: {
                    targetSheet: "GEL5",
                    scriptUrl: "https://script.google.com/macros/s/AKfycby2o_XXEpjdh14jRQ3ScFWesbMGtAyN0hDCW00FO1u65EhHLTg-PpXlGXkrv57U4At0/exec"
                },
                loading: false,
                progressText: '',
                formData: { ...initialForm },
                kelompok: [],
                
                resetKelompok() { this.kelompok = []; },
                removeMhs(index) { this.kelompok.splice(index, 1); },

                handleFile(e, targetObj, isMulti) {
                    const files = e.target.files;
                    if (!files.length) return;
                    if (!isMulti) {
                        const reader = new FileReader();
                        reader.onload = (f) => { targetObj.pasFotoData = f.target.result.split(',')[1]; targetObj.pasFotoType = files[0].type; };
                        reader.readAsDataURL(files[0]);
                    } else {
                        targetObj.dokumenList = [];
                        Array.from(files).forEach(file => {
                            const reader = new FileReader();
                            reader.onload = (f) => { targetObj.dokumenList.push({ name: file.name, type: file.type, base64: f.target.result.split(',')[1] }); };
                            reader.readAsDataURL(file);
                        });
                    }
                },

                validateAge() {
                    const age = new Date().getFullYear() - new Date(this.formData.tanggalLahir).getFullYear();
                    if (age < 14) { alert("Umur minimal 14 tahun!"); this.formData.tanggalLahir = ''; }
                },

                validateDates() {
                    if (new Date(this.formData.startDate) > new Date(this.formData.endDate)) {
                        alert("Start Date tidak boleh melewati End Date!"); this.formData.endDate = '';
                    }
                },

                async handleSubmit() {
                    if (this.formData.tipe === 'Kelompok' && this.kelompok.length < 2) {
                        alert("Gagal: Pendaftaran kelompok harus minimal 2 orang anggota!");
                        return;
                    }

                    this.loading = true;
                    try {
                        if (this.formData.tipe === 'Perorangan') {
                            this.progressText = "Sedang mengirim data...";
                            await this.sendToAppsScript(this.formData);
                        } else {
                            let total = this.kelompok.length;
                            for (let [index, mhs] of this.kelompok.entries()) {
                                this.progressText = `Mengirim data anggota ${index + 1} dari ${total}...`;
                                let dataToSend = { ...this.formData, ...mhs };
                                await this.sendToAppsScript(dataToSend);
                            }
                        }
                        alert("Pendaftaran Berhasil Terkirim!");
                        window.location.reload(); 
                    } catch (e) {
                        alert("Gagal: " + e);
                        this.loading = false;
                    }
                },

                async sendToAppsScript(payload) {
                    // MENGGUNAKAN FORMDATA (LEBIH STABIL UNTUK BASE64)
                    const body = new FormData();
                    body.append("targetSheet", this.config.targetSheet);
                    for (let key in payload) {
                        if (key === 'dokumenList') {
                            body.append(key, JSON.stringify(payload[key]));
                        } else if (payload[key]) {
                            body.append(key, payload[key]);
                        }
                    }
                    await fetch(this.config.scriptUrl, { method: 'POST', body: body, mode: 'no-cors' });
                }
            }
        }
    </script>
</body>
</html>
