<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data - Edit/Delete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; font-family: 'Segoe UI', sans-serif; }
        .card-custom { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; }
        .header-title { color: #dc3545; font-weight: bold; text-align: center; margin-bottom: 25px; }
        .table-area { background: #fff; border-radius: 10px; overflow: hidden; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-custom">
        <h2 class="header-title">⚙️ Pengelolaan Data Peserta</h2>
        
        <div class="mb-3 d-flex justify-content-between">
            <button class="btn btn-secondary" onclick="backToHome()">⬅️ Kembali</button>
            <input type="text" id="searchInput" class="form-control w-50" placeholder="Cari Nama atau NIM..." onkeyup="filterTable()">
        </div>

        <div class="table-area">
            <table class="table table-hover mb-0" id="pesertaTable">
                <thead class="table-dark">
                    <tr>
                        <th>Nama</th>
                        <th>NIM</th>
                        <th>Sekolah</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" class="text-center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyRh_GJQaJrv6dEV5uywr4CE1WFuipEnERyN4rJyt1U0VpitmUTjCKcHpAL2u0tUYps/exec';

    window.onload = function() {
        google.script.run.withSuccessHandler(showData).getSheetData();
    };

    function showData(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.nama}</td>
                    <td>${item.nim}</td>
                    <td>${item.sekolah}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="btnEdit('${item.nim}', '${item.nama}', '${item.sekolah}')">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="btnDelete('${item.nim}')">Hapus</button>
                    </td>
                </tr>`;
        });
    }

    function btnDelete(nim) {
        if(confirm("Hapus data dengan NIM: " + nim + "?")) {
            const fd = new FormData();
            fd.append('action', 'delete');
            fd.append('old_nim', nim);

            fetch(scriptURL, { method: 'POST', body: fd })
            .then(() => { alert('Data Dihapus'); location.reload(); })
            .catch(e => console.error(e));
        }
    }

    function btnEdit(nim, nama, sekolah) {
        const newNama = prompt("Edit Nama:", nama);
        const newSekolah = prompt("Edit Sekolah:", sekolah);
        
        if (newNama && newSekolah) {
            const fd = new FormData();
            fd.append('action', 'update');
            fd.append('old_nim', nim); // Kunci pencarian
            fd.append('nama', newNama);
            fd.append('nim', nim);
            fd.append('sekolah', newSekolah);

            fetch(scriptURL, { method: 'POST', body: fd })
            .then(res => res.text())
            .then(txt => { alert(txt); location.reload(); });
        }
    }

    function backToHome() {
        window.open(scriptURL + "?p=index", "_top");
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toUpperCase();
        let rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let txt = rows[i].textContent || rows[i].innerText;
            rows[i].style.display = txt.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }
</script>
</body>
</html>
