<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Peserta Didik 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; color: #495057; }
        [x-cloak] { display: none !important; }
        .input-field { border: 1px solid #dee2e6; padding: 0.7rem 1rem; border-radius: 0.5rem; width: 100%; font-size: 0.9rem; transition: all 0.2s ease; background-color: #ffffff; }
        .input-field:focus { border-color: #714B67; outline: none; box-shadow: 0 0 0 3px rgba(113, 75, 103, 0.1); }
        .label-text { font-weight: 600; font-size: 0.8rem; color: #495057; margin-bottom: 0.4rem; display: block; }
        .section-card { background: #ffffff; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 2rem; }
        .photo-box { width: 140px; height: 180px; border: 2px dashed #dee2e6; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #fdfdfd; transition: all 0.2s; }
        .btn-primary { background-color: #714B67; color: white; font-weight: 700; transition: all 0.3s; }
        .btn-primary:hover { background-color: #5a3b52; transform: translateY(-2px); }
    </style>
</head>
<body class="py-10 px-4 antialiased" x-data="app()">

    <datalist id="list-kota"><template x-for="item in options.kota"><option :value="item"></option></template></datalist>
    <datalist id="list-univ"><template x-for="item in options.universitas"><option :value="item"></option></template></datalist>
    <datalist id="list-jurusan"><template x-for="item in options.jurusan"><option :value="item"></option></template></datalist>

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-[#212529]">Data Peserta Didik 2026</h1>
        </div>

        <template x-if="view === 'menu'">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-3xl mx-auto mt-10">
                <div @click="startNewInput()" class="section-card cursor-pointer border-2 border-transparent hover:border-[#714B67] transition-all text-center p-10">
                    <h3 class="text-xl font-bold text-blue-600">Input Data Peserta Baru</h3>
                    <p class="text-gray-400 text-sm mt-2">Daftarkan mahasiswa/siswa ke sistem.</p>
                </div>
                <div @click="window.location.href='edit.html'" class="section-card cursor-pointer border-2 border-transparent hover:border-amber-500 transition-all text-center p-10">
                    <h3 class="text-xl font-bold text-amber-600">Edit / Delete Data</h3>
                    <p class="text-gray-400 text-sm mt-2">Kelola database yang ada.</p>
                </div>
            </div>
        </template>

        <template x-if="view === 'input'">
            <div>
                <button @click="window.location.href='index.html'" class="mb-6 flex items-center text-[#714B67] font-bold hover:underline">← Kembali ke Menu Utama</button>

                <form @submit.prevent="handleSubmit" :class="loading ? 'opacity-50 pointer-events-none' : ''">
                    
                    <div class="section-card">
                        <h2 class="text-[#714B67] font-bold uppercase tracking-wider text-xs mb-6 border-b pb-3">I. Data Institusi & Kegiatan</h2>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div class="md:col-span-4">
                                <label class="label-text">Bagian</label>
                                <select x-model="formData.bagian" class="input-field" required>
                                    <option value="">-- Pilih Bagian --</option>
                                    <option>Pelayanan Medik</option>
                                    <option>Penunjang Medik</option>
                                    <option>Umum</option>
                                </select>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-text">Jenis Kegiatan</label>
                                <select x-model="formData.jenis" class="input-field" required>
                                    <option>PKL</option><option>PBL</option><option>Magang</option><option>Resident</option><option>Hospital Visit</option>
                                </select>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-text">Jenjang Pendidikan</label>
                                <select x-model="formData.jenjangPendidikan" class="input-field" required>
                                    <option>SMK</option><option>D3</option><option>D4</option><option>S1</option><option>S2 Pasca Sarjana</option><option>Profesi</option>
                                </select>
                            </div>

                            <div class="md:col-span-4">
                                <label class="label-text">Level</label>
                                <select x-model="formData.level" class="input-field" required>
                                    <option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option><option value="4">Level 4</option>
                                </select>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-text">Nama Institusi</label>
                                <input type="text" x-model="formData.namaInstitusi" list="list-univ" class="input-field" required>
                            </div>
                            <div class="md:col-span-2">
                                <label class="label-text">Jurusan</label>
                                <input type="text" x-model="formData.jurusan" list="list-jurusan" class="input-field" required>
                            </div>
                            <div class="md:col-span-2">
                                <label class="label-text">Kota Institusi</label>
                                <input type="text" x-model="formData.kotaInstitusi" list="list-kota" class="input-field" required>
                            </div>

                            <div class="md:col-span-1">
                                <label class="label-text">Tgl Mulai</label>
                                <input type="date" x-model="formData.startDate" class="input-field" required>
                            </div>
                            <div class="md:col-span-1">
                                <label class="label-text">Tgl Selesai</label>
                                <input type="date" x-model="formData.endDate" @change="validateDates" class="input-field" required>
                            </div>

                            <template x-if="formData.allowGroup">
                                <div class="md:col-span-4 p-4 bg-purple-50 border border-purple-200 rounded-lg">
                                    <label class="label-text text-purple-700">Tipe Pendaftaran</label>
                                    <select x-model="formData.tipe" class="input-field border-purple-300" @change="resetKelompok">
                                        <option value="Perorangan">Perorangan</option>
                                        <option value="Kelompok">Kelompok</option>
                                    </select>
                                </div>
                            </template>
                        </div>
                    </div>

                    <template x-if="formData.tipe === 'Perorangan'">
                        <div class="section-card">
                            <h2 class="text-[#714B67] font-bold uppercase tracking-wider text-xs mb-6 border-b pb-3">II. Biodata & Berkas</h2>
                            <div class="flex flex-col md:flex-row gap-8">
                                <div class="flex flex-col items-center">
                                    <div class="photo-box">
                                        <template x-if="!photoPreview"><span class="text-[10px] text-gray-400 text-center p-2">Upload Foto (Max 400KB)</span></template>
                                        <template x-if="photoPreview"><img :src="photoPreview" class="w-full h-full object-cover"></template>
                                        <input type="file" @change="handlePhoto($event, formData)" accept=".jpg,.jpeg" class="absolute inset-0 opacity-0 cursor-pointer">
                                    </div>
                                </div>
                                <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div class="md:col-span-2"><label class="label-text">Nama Lengkap</label><input type="text" x-model="formData.nama" class="input-field" required></div>
                                    <div><label class="label-text">NIM</label><input type="text" x-model="formData.nim" :disabled="isEdit" class="input-field" required></div>
                                    <div><label class="label-text">No. KTP</label><input type="number" x-model="formData.ktp" class="input-field" required></div>
                                    <div><label class="label-text">Agama</label>
                                        <select x-model="formData.agama" class="input-field">
                                            <option>Islam</option><option>Kristen</option><option>Katolik</option><option>Hindu</option><option>Budha</option>
                                        </select>
                                    </div>
                                    <div><label class="label-text">Jenis Kelamin</label>
                                        <select x-model="formData.jenisKelamin" class="input-field"><option>Laki-Laki</option><option>Perempuan</option></select>
                                    </div>
                                    <div><label class="label-text">No. WhatsApp</label><input type="number" x-model="formData.hp" class="input-field" placeholder="62812..." required></div>
                                    <div><label class="label-text">Tempat Lahir</label><input type="text" x-model="formData.tempatLahir" class="input-field" required></div>
                                    <div><label class="label-text">Tgl Lahir</label><input type="date" x-model="formData.tanggalLahir" class="input-field" required></div>
                                    <div class="md:col-span-2"><label class="label-text">Alamat Lengkap</label><input type="text" x-model="formData.alamat" class="input-field" required></div>
                                    <div class="md:col-span-2"><label class="label-text">Kelurahan - Kecamatan</label><input type="text" x-model="formData.kelurahanKecamatan" class="input-field" required></div>
                                    <div class="md:col-span-2">
                                        <label class="label-text">Dokumen PDF (Max Total 4MB)</label>
                                        <input type="file" multiple @change="handleFile($event, formData)" accept="application/pdf" class="input-field text-xs">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <template x-if="formData.tipe === 'Kelompok'">
                        <div class="section-card" x-data="{ showForm: false, tempMhs: {agama:'Islam', jenisKelamin:'Laki-Laki'} }">
                            <h2 class="text-[#714B67] font-bold uppercase tracking-wider text-xs mb-6 border-b pb-3">II. Anggota Kelompok</h2>
                            <div class="overflow-x-auto mb-6 border rounded-lg">
                                <table class="w-full text-xs text-left">
                                    <thead class="bg-gray-50 border-b"><tr><th class="p-3">Nama</th><th class="p-3">NIM</th><th class="p-3 text-center">Aksi</th></tr></thead>
                                    <tbody>
                                        <template x-for="(mhs, index) in kelompok" :key="index">
                                            <tr class="border-t"><td class="p-3 font-bold" x-text="mhs.nama"></td><td class="p-3" x-text="mhs.nim"></td><td class="p-3 text-center"><button type="button" @click="removeMhs(index)" class="text-red-500 font-bold">Hapus</button></td></tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                            <button type="button" @click="showForm = true" class="bg-white border-2 border-[#714B67] text-[#714B67] px-5 py-2 rounded-lg font-bold text-xs">+ Tambah Anggota</button>

                            <div x-show="showForm" class="p-6 bg-gray-50 border rounded-xl mt-4">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <input type="text" placeholder="Nama Lengkap" x-model="tempMhs.nama" class="input-field">
                                    <input type="text" placeholder="NIM" x-model="tempMhs.nim" class="input-field">
                                    <input type="number" placeholder="No. KTP" x-model="tempMhs.ktp" class="input-field">
                                    <input type="number" placeholder="No. WA" x-model="tempMhs.hp" class="input-field">
                                    <select x-model="tempMhs.agama" class="input-field"><option>Islam</option><option>Kristen</option><option>Katolik</option></select>
                                    <select x-model="tempMhs.jenisKelamin" class="input-field"><option>Laki-Laki</option><option>Perempuan</option></select>
                                    <input type="text" placeholder="Tempat Lahir" x-model="tempMhs.tempatLahir" class="input-field">
                                    <input type="date" x-model="tempMhs.tanggalLahir" class="input-field">
                                    <input type="text" placeholder="Alamat" x-model="tempMhs.alamat" class="input-field md:col-span-2">
                                    <div class="md:col-span-2">
                                        <label class="text-[10px] font-bold">PDF Anggota (Max Total 4MB)</label>
                                        <input type="file" multiple @change="handleFile($event, tempMhs)" accept="application/pdf" class="input-field text-xs">
                                    </div>
                                </div>
                                <div class="mt-4 flex gap-2">
                                    <button type="button" @click="if(tempMhs.nama && tempMhs.nim){ kelompok.push({...tempMhs}); showForm = false; tempMhs={agama:'Islam', jenisKelamin:'Laki-Laki'}; }else{alert('Nama & NIM wajib!')}" class="bg-[#714B67] text-white px-4 py-2 rounded text-xs font-bold">Simpan</button>
                                    <button type="button" @click="showForm = false" class="bg-gray-300 px-4 py-2 rounded text-xs font-bold">Batal</button>
                                </div>
                            </div>
                        </div>
                    </template>

                    <button type="submit" class="w-full btn-primary py-5 rounded-xl text-lg shadow-lg mb-10" :disabled="loading">
                        <span x-show="!loading" x-text="formData.tipe === 'Kelompok' ? 'SUBMIT KELOMPOK (' + kelompok.length + ')' : 'SUBMIT DATA PENDAFTARAN'"></span>
                        <span x-show="loading" x-text="progressText || 'SEDANG MENGIRIM...'"></span>
                    </button>
                </form>
            </div>
        </template>
    </div>

    <div @click="formData.allowGroup = !formData.allowGroup" class="fixed bottom-2 right-2 w-8 h-8 cursor-pointer opacity-0 z-50"></div>

   <script>
    function app() {
        return {
            view: 'menu', loading: false, isEdit: false, progressText: '', photoPreview: null,
            options: {
                kota: ["Aceh", "Bandung", "Jakarta", "Surabaya", "Medan", "Makassar", "Yogyakarta", "Semarang", "Malang"],
                universitas: ["UNPAD", "ITB", "UPI", "UI", "UGM", "UNISA", "Poltekkes", "Stikes"],
                jurusan: ["Keperawatan", "Kebidanan", "Kedokteran", "Farmasi", "Gizi", "Analis", "IT", "Manajemen"]
            },
            config: {
                targetSheet: "GEL6",
                scriptUrl: "https://script.google.com/macros/s/AKfycby2o_XXEpjdh14jRQ3ScFWesbMGtAyN0hDCW00FO1u65EhHLTg-PpXlGXkrv57U4At0/exec"
            },
            formData: { 
                tipe: 'Perorangan', allowGroup: false, bagian: '', jenis: 'Magang', jenjangPendidikan: 'S1', 
                namaInstitusi: '', jurusan: '', kotaInstitusi: '', level: 1, startDate: '', endDate: '', 
                nama: '', nim: '', ktp: '', hp: '', agama: 'Islam', jenisKelamin: 'Laki-Laki', 
                tempatLahir: '', tanggalLahir: '', alamat: '', kelurahanKecamatan: '', 
                pasFotoData: '', dokumenList: [] 
            },
            kelompok: [],

            init() {
                const params = new URLSearchParams(window.location.search);
                if (params.get('action') === 'edit') this.loadEditData(params.get('nim'));
            },
            startNewInput() { this.view = 'input'; this.isEdit = false; },
            handlePhoto(e, target) {
                const file = e.target.files[0];
                if (file && file.size < 500000) {
                    const reader = new FileReader();
                    reader.onload = (f) => { this.photoPreview = f.target.result; target.pasFotoData = f.target.result.split(',')[1]; };
                    reader.readAsDataURL(file);
                } else { alert("Foto max 500KB"); }
            },
            handleFile(e, target) {
                const files = Array.from(e.target.files);
                const MAX_TOTAL = 4 * 1024 * 1024;
                let currentSize = 0;
                target.dokumenList = [];
                for (let file of files) {
                    currentSize += file.size;
                    if (currentSize > MAX_TOTAL) { alert("Total file PDF melebihi 4MB!"); e.target.value = ""; return; }
                    const reader = new FileReader();
                    reader.onload = (f) => { target.dokumenList.push({ name: file.name, base64: f.target.result.split(',')[1] }); };
                    reader.readAsDataURL(file);
                }
            },
            async handleSubmit() {
                this.loading = true;
                try {
                    if (this.formData.tipe === 'Perorangan') {
                        await this.sendToAppsScript(this.formData);
                    } else {
                        for (let [i, mhs] of this.kelompok.entries()) {
                            this.progressText = `Mengirim Anggota ${i+1}/${this.kelompok.length}...`;
                            await this.sendToAppsScript({ ...this.formData, ...mhs });
                        }
                    }
                    alert("Berhasil Terkirim!"); window.location.href = 'index.html';
                } catch (e) { alert("Error: " + e); this.loading = false; }
            },
            async sendToAppsScript(payload) {
                return fetch(this.config.scriptUrl, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...payload, targetSheet: this.config.targetSheet, action: this.isEdit ? "edit" : "insert" })
                });
            },
            resetKelompok() { this.kelompok = []; },
            removeMhs(i) { this.kelompok.splice(i, 1); },
            validateDates() { if (new Date(this.formData.startDate) > new Date(this.formData.endDate)) this.formData.endDate = ''; }
        }
    }
</script>
</body>
</html>
