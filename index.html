<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Peserta Didik 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; color: #495057; }
        [x-cloak] { display: none !important; }
        .input-field { border: 1px solid #dee2e6; padding: 0.7rem 1rem; border-radius: 0.5rem; width: 100%; font-size: 0.9rem; transition: all 0.2s ease; background-color: #ffffff; }
        .input-field:focus { border-color: #714B67; outline: none; box-shadow: 0 0 0 3px rgba(113, 75, 103, 0.1); }
        .label-text { font-weight: 600; font-size: 0.8rem; color: #495057; margin-bottom: 0.4rem; display: block; }
        .section-card { background: #ffffff; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 2rem; }
        .photo-box { width: 140px; height: 180px; border: 2px dashed #dee2e6; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #fdfdfd; }
        .btn-primary { background-color: #714B67; color: white; font-weight: 700; transition: all 0.3s; }
        .btn-primary:hover { background-color: #5a3b52; transform: translateY(-2px); }
        .note-text { font-size: 10px; color: #6c757d; margin-top: 5px; line-height: 1.4; }
    </style>
</head>
<body class="py-10 px-4 antialiased" x-data="app()">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-[#212529]">Data Peserta Didik 2026</h1>
        </div>

        <template x-if="view === 'menu'">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-3xl mx-auto mt-10">
                <div @click="view = 'input'" class="section-card cursor-pointer border-2 border-transparent hover:border-[#714B67] transition-all text-center p-10">
                    <h3 class="text-xl font-bold text-blue-600">Input Data Peserta Baru</h3>
                    <p class="text-gray-400 text-sm mt-2">Daftarkan mahasiswa/siswa ke sistem.</p>
                </div>
                <div @click="window.location.href='edit.html'" class="section-card cursor-pointer border-2 border-transparent hover:border-amber-500 transition-all text-center p-10">
                    <h3 class="text-xl font-bold text-amber-600">Edit / Delete Data</h3>
                    <p class="text-gray-400 text-sm mt-2">Kelola database yang ada.</p>
                </div>
            </div>
        </template>

        <template x-if="view === 'input'">
            <div>
                <button @click="view = 'menu'" class="mb-6 flex items-center text-[#714B67] font-bold hover:underline">← Kembali ke Menu Utama</button>

                <form @submit.prevent="handleSubmit" :class="loading ? 'opacity-50 pointer-events-none' : ''">
                    
                    <div class="section-card">
                        <h2 class="text-[#714B67] font-bold uppercase tracking-wider text-xs mb-6 border-b pb-3">I. Data Institusi & Kegiatan</h2>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            
                            <div class="md:col-span-4">
                                <label class="label-text">Bagian</label>
                                <select x-model="formData.bagian" class="input-field" required>
                                    <option value="">-- Pilih Bagian --</option>
                                    <option>Pelayanan Medik</option>
                                    <option>Penunjang Medik</option>
                                    <option>Umum</option>
                                </select>
                                <p class="note-text"><strong>Catatan:</strong> Medik (Perawat/Bidan/Dokter), Penunjang (Farmasi/Gizi/Rad/Lab), Umum (IT/Admin/Manajemen/Teknik).</p>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-text">Jenis Kegiatan</label>
                                <select x-model="formData.jenis" class="input-field" required>
                                    <option>PKL</option><option>PBL</option><option>Magang</option><option>Resident</option>
                                </select>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-text">Jenjang Pendidikan</label>
                                <select x-model="formData.jenjangPendidikan" class="input-field" required>
                                    <option>SMK</option><option>D3</option><option>S1</option><option>Profesi</option><option>Spesialis</option>
                                </select>
                            </div>

                            <div class="md:col-span-4">
                                <label class="label-text">Level</label>
                                <select x-model="formData.level" class="input-field" required>
                                    <option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option><option value="4">Level 4</option>
                                </select>
                                <p class="note-text"><strong>Catatan Level:</strong> 1 (Observasi), 2 (Bimbingan), 3 (Mandiri Terbatas), 4 (Mandiri Penuh).</p>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-text">Nama Institusi</label>
                                <input type="text" x-model="formData.namaInstitusi" class="input-field" required>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-text">Jurusan</label>
                                <input type="text" x-model="formData.jurusan" class="input-field" required>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-text">Tanggal Mulai</label>
                                <input type="date" x-model="formData.startDate" class="input-field" required>
                            </div>

                            <div class="md:col-span-2">
                                <label class="label-text">Tanggal Selesai</label>
                                <input type="date" x-model="formData.endDate" class="input-field" required>
                            </div>

                            <div class="md:col-span-4 p-4 bg-purple-50 rounded-lg" x-show="formData.allowGroup" x-cloak>
                                <label class="label-text text-purple-700">Tipe Pendaftaran (Opsi Admin)</label>
                                <select x-model="formData.tipe" class="input-field border-purple-300" @change="kelompok = []">
                                    <option value="Perorangan">Perorangan</option>
                                    <option value="Kelompok">Kelompok</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <template x-if="formData.tipe === 'Perorangan'">
                        <div class="section-card">
                            <h2 class="text-[#714B67] font-bold uppercase tracking-wider text-xs mb-6 border-b pb-3">II. Biodata Lengkap</h2>
                            <div class="flex flex-col md:flex-row gap-8">
                                <div class="flex flex-col items-center">
                                    <div class="photo-box">
                                        <template x-if="!photoPreview"><span class="text-[10px] text-gray-400">Foto 3x4</span></template>
                                        <template x-if="photoPreview"><img :src="photoPreview" class="w-full h-full object-cover"></template>
                                        <input type="file" @change="handlePhoto" accept=".jpg,.jpeg" class="absolute inset-0 opacity-0 cursor-pointer">
                                    </div>
                                    <p class="text-[9px] mt-2">Max 500KB (.jpg)</p>
                                </div>
                                <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div class="md:col-span-2"><label class="label-text">Nama Lengkap</label><input type="text" x-model="formData.nama" class="input-field" required></div>
                                    <div><label class="label-text">NIM</label><input type="text" x-model="formData.nim" class="input-field" required></div>
                                    <div><label class="label-text">No. KTP</label><input type="number" x-model="formData.ktp" class="input-field" required></div>
                                    <div><label class="label-text">Agama</label>
                                        <select x-model="formData.agama" class="input-field">
                                            <option>Islam</option><option>Kristen</option><option>Katolik</option><option>Hindu</option><option>Budha</option>
                                        </select>
                                    </div>
                                    <div><label class="label-text">No. WhatsApp</label><input type="number" x-model="formData.hp" class="input-field" required></div>
                                    <div class="md:col-span-2"><label class="label-text">Alamat Lengkap</label><input type="text" x-model="formData.alamat" class="input-field" required></div>
                                    <div class="md:col-span-2">
                                        <label class="label-text font-bold text-red-600">Dokumen PDF (Max TOTAL 4MB)</label>
                                        <input type="file" multiple @change="handleFile($event, formData)" accept="application/pdf" class="input-field text-xs">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <button type="submit" class="w-full btn-primary py-5 rounded-xl text-lg shadow-lg" :disabled="loading">
                        <span x-show="!loading" x-text="formData.tipe === 'Kelompok' ? 'SUBMIT KELOMPOK' : 'SUBMIT DATA'"></span>
                        <span x-show="loading">Sedang Mengirim...</span>
                    </button>
                </form>
            </div>
        </template>
    </div>

    <div @click="formData.allowGroup = !formData.allowGroup" class="fixed bottom-2 right-2 w-10 h-10 cursor-pointer opacity-0 z-50"></div>

    <script>
    function app() {
        return {
            view: 'menu', loading: false, photoPreview: null,
            config: {
                scriptUrl: "ISI_DENGAN_URL_SCRIPT_GOOGLE_ANDA" 
            },
            formData: { 
                allowGroup: false, tipe: 'Perorangan', bagian: '', jenis: 'Magang', jenjangPendidikan: 'S1', 
                level: '1', namaInstitusi: '', jurusan: '', startDate: '', endDate: '', 
                nama: '', nim: '', ktp: '', hp: '', agama: 'Islam', alamat: '', 
                pasFotoData: '', dokumenList: [] 
            },

            handlePhoto(e) {
                const file = e.target.files[0];
                if (file && file.size < 500000) {
                    const reader = new FileReader();
                    reader.onload = (f) => { this.photoPreview = f.target.result; this.formData.pasFotoData = f.target.result.split(',')[1]; };
                    reader.readAsDataURL(file);
                } else { alert("Foto Max 500KB!"); }
            },

            handleFile(e, target) {
                const files = Array.from(e.target.files);
                const MAX_TOTAL = 4 * 1024 * 1024; // 4MB
                let currentTotal = 0;
                target.dokumenList = [];

                for (let file of files) {
                    currentTotal += file.size;
                    if (currentTotal > MAX_TOTAL) {
                        alert("Gagal! Total semua file PDF yang Anda pilih melebihi 4MB.");
                        e.target.value = "";
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        target.dokumenList.push({ name: file.name, base64: f.target.result.split(',')[1] });
                    };
                    reader.readAsDataURL(file);
                }
            },

            async handleSubmit() {
                this.loading = true;
                try {
                    await fetch(this.config.scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(this.formData)
                    });
                    alert("Berhasil!");
                    window.location.reload();
                } catch (e) { alert("Error: " + e); this.loading = false; }
            }
        }
    }
    </script>
</body>
</html>
