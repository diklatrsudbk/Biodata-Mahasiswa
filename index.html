<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Mahasiswa Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
        .input-modern { 
            @apply block w-full px-4 py-3 text-gray-900 border border-gray-300 rounded-xl bg-gray-50 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 text-sm;
        }
        .label-modern { @apply block mb-2 text-xs font-semibold text-gray-600 uppercase tracking-wider; }
        .btn-primary { @apply px-6 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200; }
        .modal-overlay { @apply fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm z-50 flex items-center justify-center p-4; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen pb-12" x-data="app()">

    <div class="bg-white border-b sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold text-gray-900 tracking-tight" x-text="config.targetSheet"></h1>
                <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Portal Registrasi</p>
            </div>
            <div class="h-10 w-10 bg-blue-100 rounded-full flex items-center justify-center">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <form @submit.prevent="handleSubmit" :class="loading ? 'opacity-50 pointer-events-none' : ''">
            
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-600 font-bold text-sm">01</div>
                    <h2 class="text-lg font-bold text-gray-800">Data Institusi & Program</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="label-modern">Nama Institusi</label>
                        <input type="text" x-model="formData.namaInstitusi" class="input-modern" placeholder="Contoh: Universitas Indonesia" required>
                    </div>
                    <div>
                        <label class="label-modern">Tipe Pendaftaran</label>
                        <select x-model="formData.tipe" class="input-modern" @change="resetKelompok">
                            <option value="Perorangan">🙋‍♂️ Perorangan</option>
                            <option value="Kelompok">👨‍👩‍👧‍👦 Kelompok</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-modern">Jenis Kegiatan</label>
                        <select x-model="formData.jenis" class="input-modern">
                            <option>Magang</option><option>PKL</option><option>PBL</option><option>Penelitian</option><option>Resident</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-modern">Kota Institusi</label>
                        <input type="text" x-model="formData.kotaInstitusi" class="input-modern" required>
                    </div>
                    <div>
                        <label class="label-modern">Bagian Tujuan</label>
                        <select x-model="formData.bagian" class="input-modern">
                            <option>Pelayanan Medik</option><option>Penunjang Medik</option><option>Umum</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-modern">Tanggal Mulai</label>
                        <input type="date" x-model="formData.startDate" class="input-modern" required>
                    </div>
                    <div>
                        <label class="label-modern">Tanggal Selesai</label>
                        <input type="date" x-model="formData.endDate" class="input-modern" required>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-600 font-bold text-sm">02</div>
                    <h2 class="text-lg font-bold text-gray-800">Detail Peserta</h2>
                </div>

                <template x-if="formData.tipe === 'Perorangan'">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="md:col-span-2">
                            <label class="label-modern">Nama Lengkap</label>
                            <input type="text" x-model="formData.nama" class="input-modern" required>
                        </div>
                        <div><label class="label-modern">NIM</label><input type="text" x-model="formData.nim" class="input-modern" required></div>
                        <div><label class="label-modern">No. WA</label><input type="tel" x-model="formData.hp" class="input-modern" placeholder="0812..." required></div>
                        <div><label class="label-modern">Tempat Lahir</label><input type="text" x-model="formData.tempatLahir" class="input-modern" required></div>
                        <div><label class="label-modern">Tgl Lahir</label><input type="date" x-model="formData.tanggalLahir" class="input-modern" required></div>
                        <div class="md:col-span-2"><label class="label-modern">Alamat Domisili</label><input type="text" x-model="formData.alamat" class="input-modern" required></div>
                        <div class="md:col-span-2"><label class="label-modern">Kelurahan / Kecamatan</label><input type="text" x-model="formData.kelurahanKecamatan" class="input-modern" required></div>
                    </div>
                </template>

                <template x-if="formData.tipe === 'Kelompok'">
                    <div x-data="{ showModal: false, tempMhs: {} }">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-sm text-gray-500">Anggota: <b x-text="kelompok.length" class="text-blue-600"></b></span>
                            <button type="button" @click="showModal = true; tempMhs = { agama: 'Islam', jenisKelamin: 'Laki-Laki', dokumenList: [] }" 
                                class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-100 transition">
                                + Tambah Anggota
                            </button>
                        </div>

                        <div class="space-y-3">
                            <template x-for="(mhs, index) in kelompok" :key="index">
                                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 bg-white border rounded-full flex items-center justify-center text-[10px] font-bold" x-text="index+1"></div>
                                        <div>
                                            <p class="text-sm font-bold text-gray-800" x-text="mhs.nama"></p>
                                            <p class="text-[10px] text-gray-500" x-text="mhs.nim + ' • ' + mhs.hp"></p>
                                        </div>
                                    </div>
                                    <button type="button" @click="removeMhs(index)" class="p-2 text-red-400 hover:text-red-600">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                            </template>
                        </div>

                        <div x-show="showModal" x-cloak class="modal-overlay">
                            <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                                <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                                    <h3 class="font-bold text-gray-800">Biodata Anggota</h3>
                                    <button type="button" @click="showModal = false" class="text-gray-400 hover:text-gray-600">✕</button>
                                </div>
                                <div class="p-6 max-h-[70vh] overflow-y-auto">
                                    <div class="space-y-4">
                                        <div><label class="label-modern">Nama Lengkap</label><input type="text" x-model="tempMhs.nama" class="input-modern"></div>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div><label class="label-modern">NIM</label><input type="text" x-model="tempMhs.nim" class="input-modern"></div>
                                            <div><label class="label-modern">No. WA</label><input type="tel" x-model="tempMhs.hp" class="input-modern"></div>
                                        </div>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div><label class="label-modern">Tempat Lahir</label><input type="text" x-model="tempMhs.tempatLahir" class="input-modern"></div>
                                            <div><label class="label-modern">Tgl Lahir</label><input type="date" x-model="tempMhs.tanggalLahir" class="input-modern"></div>
                                        </div>
                                        <div><label class="label-modern">Alamat</label><input type="text" x-model="tempMhs.alamat" class="input-modern"></div>
                                        <div><label class="label-modern">Kelurahan-Kecamatan</label><input type="text" x-model="tempMhs.kelurahanKecamatan" class="input-modern"></div>
                                    </div>
                                </div>
                                <div class="p-6 border-t flex gap-3 bg-white">
                                    <button type="button" @click="if(tempMhs.nama && tempMhs.nim) { kelompok.push({...tempMhs}); showModal = false; } else { alert('Nama & NIM wajib diisi!') }" 
                                        class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-100">SIMPAN ANGGOTA</button>
                                    <button type="button" @click="showModal = false" class="px-6 py-3 text-gray-500 font-semibold text-sm">BATAL</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="mt-8">
                <button type="submit" class="w-full btn-primary" :disabled="loading">
                    <span x-show="!loading">KIRIM PENDAFTARAN</span>
                    <div x-show="loading" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span x-text="progressText"></span>
                    </div>
                </button>
            </div>
        </form>
    </div>

    <script>
        function app() {
            const initialForm = {
                tipe: 'Perorangan', bagian: 'Umum', jenis: 'Magang', namaInstitusi: '', jurusan: '', kotaInstitusi: '',
                jenjangPendidikan: 'S1', level: '1', startDate: '', endDate: '',  
                nama: '', nim: '', ktp: '', hp: '', agama: 'Islam', jenisKelamin: 'Laki-Laki',
                tempatLahir: '', tanggalLahir: '', alamat: '', kelurahanKecamatan: '',
                pasFotoData: '', pasFotoType: '', dokumenList: []
            };

            return {
                config: {
                    targetSheet: "GEL5",
                    scriptUrl: "https://script.google.com/macros/s/AKfycby2o_XXEpjdh14jRQ3ScFWesbMGtAyN0hDCW00FO1u65EhHLTg-PpXlGXkrv57U4At0/exec"
                },
                loading: false,
                progressText: 'Mengirim...',
                formData: { ...initialForm },
                kelompok: [],
                
                resetKelompok() { this.kelompok = []; },
                removeMhs(index) { this.kelompok.splice(index, 1); },

                async handleSubmit() {
                    if (this.formData.tipe === 'Kelompok' && this.kelompok.length < 2) {
                        alert("Minimal 2 orang untuk kelompok!"); return;
                    }
                    this.loading = true;
                    try {
                        if (this.formData.tipe === 'Perorangan') {
                            await this.sendToAppsScript(this.formData);
                        } else {
                            for (let [index, mhs] of this.kelompok.entries()) {
                                this.progressText = `Anggota ${index + 1}...`;
                                await this.sendToAppsScript({ ...this.formData, ...mhs });
                            }
                        }
                        alert("Berhasil Terkirim!"); window.location.reload(); 
                    } catch (e) {
                        alert("Gagal: " + e); this.loading = false;
                    }
                },

                async sendToAppsScript(payload) {
                    const body = new FormData();
                    body.append("targetSheet", this.config.targetSheet);
                    for (let key in payload) {
                        if (payload[key]) body.append(key, payload[key]);
                    }
                    await fetch(this.config.scriptUrl, { method: 'POST', body: body, mode: 'no-cors' });
                }
            }
        }
    </script>
</body>
</html>
