<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit/Delete Data Peserta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; }
        .input-field { border: 1px solid #dee2e6; padding: 0.7rem 1rem; border-radius: 0.5rem; width: 100%; }
        .section-card { background: #ffffff; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
    </style>
</head>
<body class="py-10 px-4" x-data="editApp()">

    <div class="max-w-3xl mx-auto">
        <a href="index.html" class="mb-6 inline-block text-[#714B67] font-bold">← Kembali ke Input</a>

        <div class="section-card mb-6">
            <h2 class="font-bold mb-4">Cari & Kelola Data Peserta</h2>
            <div class="flex gap-2">
                <input type="text" x-model="searchNim" class="input-field" placeholder="Masukkan NIM Peserta...">
                <button @click="searchData" class="bg-[#714B67] text-white px-6 py-2 rounded-lg font-bold" :disabled="loading">Cari</button>
            </div>
        </div>

        <template x-if="foundData">
            <div class="section-card border-t-4 border-[#714B67]">
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="text-xs font-bold uppercase text-gray-400">Nama Lengkap</label>
                        <input type="text" x-model="foundData.nama" class="input-field">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase text-gray-400">Institusi</label>
                        <input type="text" x-model="foundData.namaInstitusi" class="input-field">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button @click="updateData" class="bg-blue-600 text-white py-3 rounded-lg font-bold">Simpan Perubahan</button>
                        <button @click="deleteData" class="bg-red-600 text-white py-3 rounded-lg font-bold">Hapus Peserta</button>
                    </div>
                </div>
            </div>
        </template>

        <p x-show="loading" class="text-center mt-4 text-gray-500 italic">Memproses...</p>
    </div>

    <script>
        function editApp() {
            return {
                searchNim: '',
                foundData: null,
                loading: false,
                scriptUrl: "https://script.google.com/macros/s/AKfycby2o_XXEpjdh14jRQ3ScFWesbMGtAyN0hDCW00FO1u65EhHLTg-PpXlGXkrv57U4At0/exec", // Samakan dengan index.html

                async searchData() {
                    if(!this.searchNim) return alert("Masukkan NIM!");
                    this.loading = true;
                    try {
                        const resp = await fetch(`${this.scriptUrl}?action=read&nim=${this.searchNim}`);
                        const result = await resp.json();
                        if(result.status === "success") {
                            this.foundData = result.data;
                        } else {
                            alert("Data tidak ditemukan!");
                        }
                    } catch (e) { alert("Gagal mengambil data"); }
                    this.loading = false;
                },

                async updateData() {
                    if(!confirm("Yakin ingin mengubah data ini?")) return;
                    this.loading = true;
                    // Logika fetch POST ke Apps Script dengan action=update
                    alert("Fitur Update perlu disesuaikan di Apps Script (GS) Anda");
                    this.loading = false;
                },

                async deleteData() {
                    if(!confirm("HAPUS DATA INI PERMANEN?")) return;
                    this.loading = true;
                    // Logika fetch POST ke Apps Script dengan action=delete
                    alert("Fitur Delete perlu disesuaikan di Apps Script (GS) Anda");
                    this.loading = false;
                }
            }
        }
    </script>
</body>
</html>
