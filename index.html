<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Peserta Didik 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .container-main { max-width: 900px; margin: 30px auto; }
        .card-custom { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: none; }
        .hidden { display: none; }
        .section-title { border-left: 5px solid #0d6efd; padding-left: 15px; margin-bottom: 25px; color: #0d6efd; font-weight: bold; }
        .btn-menu { height: 180px; font-size: 1.4rem; font-weight: bold; border-radius: 15px; transition: 0.3s; }
        .btn-menu:hover { transform: translateY(-8px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .table-wrapper { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="container container-main">

    <div id="pageHome" class="card-custom text-center">
        <h1 class="fw-bold mb-2">Sistem Informasi Peserta Didik</h1>
        <p class="text-muted mb-5">Ruang Diklat Lt. 6 - Tahun 2026</p>
        <div class="row g-4">
            <div class="col-md-6">
                <button class="btn btn-primary w-100 btn-menu" onclick="showPage('pageInput')">
                    <span class="d-block mb-3" style="font-size: 3rem;">📥</span>
                    Input Data Baru
                </button>
            </div>
            <div class="col-md-6">
                <button class="btn btn-outline-dark w-100 btn-menu" onclick="showPage('pageEdit')">
                    <span class="d-block mb-3" style="font-size: 3rem;">⚙️</span>
                    Edit / Delete Data
                </button>
            </div>
        </div>
    </div>

    <div id="pageInput" class="card-custom hidden">
        <h3 class="section-title">Form Registrasi Peserta Didik</h3>
        
        <form id="masterForm">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Tipe Pendaftaran</label>
                    <select name="tipe" id="tipe" class="form-select border-primary" onchange="toggleModeKelompok()">
                        <option value="Perorangan/Mandiri">Perorangan/Mandiri</option>
                        <option value="Kelompok">Kelompok</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Nama Institusi / Sekolah</label>
                    <input type="text" name="sekolah" id="sekolah" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Jurusan</label>
                    <input type="text" name="jurusan" id="jurusan" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Start Date</label>
                    <input type="date" name="start_date" id="start_date" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">End Date</label>
                    <input type="date" name="end_date" id="end_date" class="form-control" required>
                </div>
            </div>
        </form>

        <hr class="my-4">

        <h5 class="mb-3 text-secondary">Input Biodata Peserta</h5>
        <div class="row g-3" id="tempBiodataForm">
            <div class="col-md-6"><input type="text" id="tNama" class="form-control" placeholder="Nama Lengkap"></div>
            <div class="col-md-3"><input type="text" id="tNim" class="form-control" placeholder="NIM"></div>
            <div class="col-md-3"><input type="number" id="tKtp" class="form-control" placeholder="No. KTP"></div>
            <div class="col-md-3"><input type="tel" id="tHp" class="form-control" placeholder="No. WA"></div>
            <div class="col-md-3"><input type="date" id="tLahir" class="form-control" title="Tgl Lahir"></div>
            <div class="col-md-6">
                <button type="button" id="btnAddOrang" class="btn btn-info w-100 fw-bold text-white" onclick="tambahKeDaftar()">
                    + Tambah Ke Daftar
                </button>
            </div>
        </div>

        <div id="wrapperTabel" class="table-wrapper hidden">
            <table class="table table-sm table-hover">
                <thead class="table-primary">
                    <tr>
                        <th>Nama</th>
                        <th>NIM</th>
                        <th>KTP</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="listPesertaBody"></tbody>
            </table>
        </div>

        <div class="mt-5 d-flex justify-content-between">
            <button class="btn btn-light" onclick="showPage('pageHome')">Kembali ke Menu</button>
            <button id="btnSubmitAll" class="btn btn-success px-5 fw-bold" onclick="kirimSemuaData()">
                🚀 Kirim Semua Data
            </button>
        </div>
    </div>

    <div id="pageEdit" class="card-custom hidden text-center">
        <h3 class="section-title">Database Peserta Didik</h3>
        <p>Fitur ini akan dihubungkan dengan database Spreadsheet Anda.</p>
        <div class="alert alert-warning">Sedang dalam tahap pengembangan API...</div>
        <button class="btn btn-secondary mt-3" onclick="showPage('pageHome')">Kembali</button>
    </div>

</div>

<script>
    const scriptURL = 'MASUKKAN_URL_BARU_DI_SINI';
    let daftarPeserta = []; // Array untuk menampung data kelompok

    function showPage(pageId) {
        document.getElementById('pageHome').classList.add('hidden');
        document.getElementById('pageInput').classList.add('hidden');
        document.getElementById('pageEdit').classList.add('hidden');
        document.getElementById(pageId).classList.remove('hidden');
    }

    function toggleModeKelompok() {
        const tipe = document.getElementById('tipe').value;
        const wrapper = document.getElementById('wrapperTabel');
        const btnAdd = document.getElementById('btnAddOrang');
        
        if (tipe === 'Kelompok') {
            wrapper.classList.remove('hidden');
            btnAdd.innerHTML = "+ Tambah Anggota Kelompok";
        } else {
            wrapper.classList.add('hidden');
            btnAdd.innerHTML = "+ Masukkan Data";
        }
    }

    function tambahKeDaftar() {
        const nama = document.getElementById('tNama').value;
        const nim = document.getElementById('tNim').value;
        const ktp = document.getElementById('tKtp').value;
        const hp = document.getElementById('tHp').value;
        const tgl = document.getElementById('tLahir').value;

        if (!nama || !nim) { alert("Nama dan NIM wajib diisi!"); return; }

        // Simpan ke Array
        daftarPeserta.push({ nama, nim, ktp, hp, tgl });
        updateTabel();
        
        // Reset form biodata saja
        document.getElementById('tNama').value = "";
        document.getElementById('tNim').value = "";
        document.getElementById('tKtp').value = "";
    }

    function updateTabel() {
        const tbody = document.getElementById('listPesertaBody');
        tbody.innerHTML = "";
        daftarPeserta.forEach((p, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.nama}</td>
                    <td>${p.nim}</td>
                    <td>${p.ktp}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="hapusOrang(${index})">Hapus</button></td>
                </tr>`;
        });
    }

    function hapusOrang(index) {
        daftarPeserta.splice(index, 1);
        updateTabel();
    }

    async function kirimSemuaData() {
        const tipe = document.getElementById('tipe').value;
        const btn = document.getElementById('btnSubmitAll');

        // Jika Mandiri, ambil data dari field input biodata saat ini jika daftarPeserta kosong
        if (tipe === 'Perorangan/Mandiri' && daftarPeserta.length === 0) {
            tambahKeDaftar();
        }

        if (daftarPeserta.length === 0) {
            alert("Belum ada data peserta yang dimasukkan!");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = "Sedang Mengirim...";

        // Loop untuk mengirim data satu per satu ke Apps Script
        // Karena Apps Script standar menerima satu POST per satu baris
        for (let i = 0; i < daftarPeserta.length; i++) {
            const finalData = new FormData(document.getElementById('masterForm'));
            finalData.append('nama', daftarPeserta[i].nama);
            finalData.append('nim', daftarPeserta[i].nim);
            finalData.append('ktp', daftarPeserta[i].ktp);
            finalData.append('hp', daftarPeserta[i].hp);
            finalData.append('tgl_lahir', daftarPeserta[i].tgl);

            try {
                await fetch(scriptURL, { method: 'POST', body: finalData });
            } catch (e) {
                console.error("Gagal mengirim baris ke-" + (i+1));
            }
        }

        alert("Semua data berhasil terkirim!");
        location.reload();
    }
</script>

</body>
</html>
