<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Registrasi Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .input-field { border: 1px solid #d1d5db; padding: 0.4rem; border-radius: 0.375rem; width: 100%; font-size: 0.85rem; }
        .label-text { font-weight: 600; font-size: 0.75rem; color: #374151; margin-bottom: 0.15rem; display: block; }
    </style>
</head>
<body class="bg-gray-50 py-8" x-data="app()">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden">
        <div class="bg-blue-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold" x-text="'REGISTRASI ' + config.targetSheet"></h1>
        </div>

        <form @submit.prevent="handleSubmit" class="p-6">
            
            <div class="mb-8 p-4 bg-blue-50 rounded-lg border border-blue-100">
                <h2 class="font-bold text-blue-800 mb-4 border-b border-blue-200 pb-2 uppercase text-sm">I. Data Kegiatan & Institusi</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="label-text">Bagian</label>
                        <select x-model="formData.bagian" class="input-field" required>
                            <option value="">-- Pilih --</option>
                            <option>Pelayanan Medik</option><option>Penunjang Medik</option><option>Umum</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-text">Jenis Kegiatan</label>
                        <select x-model="formData.jenis" class="input-field" required>
                            <option value="">-- Pilih --</option>
                            <option>PKL</option><option>PBL</option><option>Penelitian</option><option>Magang</option><option>Resident</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-text">Tipe Pendaftaran</label>
                        <select x-model="formData.tipe" class="input-field" required @change="resetKelompok">
                            <option value="Perorangan">Perorangan</option>
                            <option value="Kelompok">Kelompok</option>
                        </select>
                    </div>
                    <div>
                        <label class="label-text">Level</label>
                        <select x-model="formData.level" class="input-field">
                            <option>1</option><option>2</option><option>3</option><option>4</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="label-text">Nama Institusi (Sekolah/Kampus)</label>
                        <input type="text" x-model="formData.namaInstitusi" class="input-field" required>
                    </div>
                    <div>
                        <label class="label-text">Jurusan</label>
                        <input type="text" x-model="formData.jurusan" class="input-field" required>
                    </div>
                    <div>
                        <label class="label-text">Kota (Institusi)</label>
                        <input type="text" x-model="formData.kota" class="input-field" required placeholder="Kota Sekolah/Kampus">
                    </div>
                    <div>
                        <label class="label-text">Jenjang</label>
                        <select x-model="formData.jenjangPendidikan" class="input-field" required>
                            <option>SMA/SMK</option><option>D3</option><option>D4</option><option>S1</option><option>S2</option><option>S3</option><option>Profesi</option>
                        </select>
                    </div>
                    <div><label class="label-text">Start Date</label><input type="date" x-model="formData.startDate" class="input-field" required></div>
                    <div><label class="label-text">End Date</label><input type="date" x-model="formData.endDate" @change="validateDates" class="input-field" required></div>
                </div>
            </div>

            <template x-if="formData.tipe === 'Perorangan'">
                <div class="mb-8 p-4 bg-white border rounded-lg shadow-sm">
                    <h2 class="font-bold text-gray-700 mb-4 border-b pb-2 uppercase text-sm">II. Biodata & Berkas Mahasiswa</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2"><label class="label-text">Nama Lengkap</label><input type="text" x-model="formData.nama" class="input-field" required></div>
                        <div><label class="label-text">NIM</label><input type="text" x-model="formData.nim" class="input-field" required></div>
                        <div><label class="label-text">No. KTP</label><input type="number" x-model="formData.ktp" class="input-field" required></div>
                        <div><label class="label-text">No. WA (HP)</label><input type="text" x-model="formData.hp" class="input-field" required></div>
                        <div><label class="label-text">Agama</label>
                            <select x-model="formData.agama" class="input-field"><option>Islam</option><option>Kristen</option><option>Katolik</option><option>Hindu</option><option>Buddha</option></select>
                        </div>
                        <div><label class="label-text">Tempat Lahir</label><input type="text" x-model="formData.tempatLahir" class="input-field" required></div>
                        <div><label class="label-text">Tgl Lahir</label><input type="date" x-model="formData.tanggalLahir" @change="validateAge" class="input-field" required></div>
                        <div><label class="label-text">Jenis Kelamin</label>
                            <select x-model="formData.jenisKelamin" class="input-field"><option>Laki-Laki</option><option>Perempuan</option></select>
                        </div>
                        <div class="md:col-span-2"><label class="label-text">Alamat Lengkap</label><input type="text" x-model="formData.alamat" class="input-field" required></div>
                        <div><label class="label-text">Kelurahan-Kecamatan</label><input type="text" x-model="formData.kelurahanKecamatan" class="input-field" required></div>
                        <div class="md:col-span-1"><label class="label-text">Pas Foto</label><input type="file" @change="handleFile($event, formData, false)" class="text-xs"></div>
                        <div class="md:col-span-2"><label class="label-text">Dokumen Pendukung (Multi-upload)</label><input type="file" multiple @change="handleFile($event, formData, true)" class="text-xs"></div>
                    </div>
                </div>
            </template>

            <template x-if="formData.tipe === 'Kelompok'">
                <div class="mb-8">
                    <h2 class="font-bold text-gray-700 mb-4 border-b pb-2 uppercase text-sm">II. Tabel Anggota Kelompok</h2>
                    <div class="overflow-x-auto border rounded-lg">
                        <table class="w-full text-[11px] text-left">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="p-2 border">Data Peserta (Nama, NIM, KTP, HP, Tgl Lahir, Tempat Lahir, Agama, Alamat, Kel-Kec)</th>
                                    <th class="p-2 border w-40">Upload Berkas</th>
                                    <th class="p-2 border text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(mhs, index) in kelompok" :key="index">
                                    <tr class="border-t bg-white">
                                        <td class="p-2 border">
                                            <div class="grid grid-cols-3 gap-2">
                                                <input type="text" x-model="mhs.nama" placeholder="Nama" class="input-field" required>
                                                <input type="text" x-model="mhs.nim" placeholder="NIM" class="input-field" required>
                                                <input type="number" x-model="mhs.ktp" placeholder="KTP" class="input-field" required>
                                                <input type="text" x-model="mhs.hp" placeholder="HP" class="input-field" required>
                                                <input type="date" x-model="mhs.tanggalLahir" class="input-field" required>
                                                <input type="text" x-model="mhs.tempatLahir" placeholder="Tempat Lahir" class="input-field" required>
                                                <input type="text" x-model="mhs.agama" placeholder="Agama" class="input-field" required>
                                                <input type="text" x-model="mhs.alamat" placeholder="Alamat" class="input-field" required>
                                                <input type="text" x-model="mhs.kelurahanKecamatan" placeholder="Kel-Kec" class="input-field" required>
                                            </div>
                                        </td>
                                        <td class="p-2 border bg-gray-50">
                                            <label class="block text-[9px] font-bold">Pas Foto:</label>
                                            <input type="file" @change="handleFile($event, mhs, false)" class="text-[9px] mb-2">
                                            <label class="block text-[9px] font-bold">Dokumen:</label>
                                            <input type="file" multiple @change="handleFile($event, mhs, true)" class="text-[9px]">
                                        </td>
                                        <td class="p-2 border text-center">
                                            <button type="button" @click="removeMhs(index)" class="text-red-500 font-bold">Hapus</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    <button type="button" @click="addMhs" class="mt-4 bg-green-600 text-white px-4 py-2 rounded text-xs">+ Tambah Anggota</button>
                </div>
            </template>

            <button type="submit" class="w-full bg-blue-700 text-white font-bold py-4 rounded-lg hover:bg-blue-900 transition disabled:bg-gray-400" :disabled="loading">
                <span x-show="!loading">SUBMIT PENDAFTARAN</span>
                <span x-show="loading">SEDANG MENGIRIM DATA...</span>
            </button>
        </form>
    </div>

    <script>
        function app() {
            const initialForm = {
                tipe: 'Perorangan', bagian: '', jenis: 'Magang', namaInstitusi: '', jurusan: '', kota: '',
                jenjangPendidikan: 'S1', level: '1', startDate: '', endDate: '', 
                nama: '', nim: '', ktp: '', hp: '', agama: 'Islam', jenisKelamin: 'Laki-Laki',
                tempatLahir: '', tanggalLahir: '', alamat: '', kelurahanKecamatan: '',
                pasFotoData: '', pasFotoType: '', dokumenList: []
            };

            return {
                config: {
                    targetSheet: "GEL5",
                    scriptUrl: "https://script.google.com/macros/s/AKfycby2o_XXEpjdh14jRQ3ScFWesbMGtAyN0hDCW00FO1u65EhHLTg-PpXlGXkrv57U4At0/exec"
                },
                loading: false,
                formData: { ...initialForm },
                kelompok: [{ nama: '', nim: '', ktp: '', hp: '', tanggalLahir: '', tempatLahir: '', agama: 'Islam', alamat: '', kelurahanKecamatan: '', pasFotoData: '', pasFotoType: '', dokumenList: [] }],
                
                addMhs() { this.kelompok.push({ nama: '', nim: '', ktp: '', hp: '', tanggalLahir: '', tempatLahir: '', agama: 'Islam', alamat: '', kelurahanKecamatan: '', pasFotoData: '', pasFotoType: '', dokumenList: [] }) },
                removeMhs(index) { if(this.kelompok.length > 1) this.kelompok.splice(index, 1) },
                resetKelompok() { this.kelompok = [{ nama: '', nim: '', ktp: '', hp: '', tanggalLahir: '', tempatLahir: '', agama: 'Islam', alamat: '', kelurahanKecamatan: '', pasFotoData: '', pasFotoType: '', dokumenList: [] }] },

                handleFile(e, targetObj, isMulti) {
                    const files = e.target.files;
                    if (!files.length) return;
                    if (!isMulti) {
                        const reader = new FileReader();
                        reader.onload = (f) => {
                            targetObj.pasFotoData = f.target.result.split(',')[1];
                            targetObj.pasFotoType = files[0].type;
                        };
                        reader.readAsDataURL(files[0]);
                    } else {
                        targetObj.dokumenList = [];
                        Array.from(files).forEach(file => {
                            const reader = new FileReader();
                            reader.onload = (f) => {
                                targetObj.dokumenList.push({ name: file.name, type: file.type, base64: f.target.result.split(',')[1] });
                            };
                            reader.readAsDataURL(file);
                        });
                    }
                },

                validateAge() {
                    const age = new Date().getFullYear() - new Date(this.formData.tanggalLahir).getFullYear();
                    if (age < 14) { alert("Umur minimal 14 tahun!"); this.formData.tanggalLahir = ''; }
                },

                validateDates() {
                    if (new Date(this.formData.startDate) > new Date(this.formData.endDate)) {
                        alert("Start Date tidak boleh melewati End Date!"); this.formData.endDate = '';
                    }
                },

                async handleSubmit() {
                    this.loading = true;
                    try {
                        if (this.formData.tipe === 'Perorangan') {
                            await this.sendToAppsScript(this.formData);
                        } else {
                            for (let mhs of this.kelompok) {
                                let dataToSend = { ...this.formData, ...mhs };
                                await this.sendToAppsScript(dataToSend);
                            }
                        }
                        alert("Pendaftaran Berhasil!");
                        window.location.reload(); 
                    } catch (e) {
                        alert("Gagal: " + e);
                    } finally {
                        this.loading = false;
                    }
                },

                async sendToAppsScript(payload) {
                    const body = new URLSearchParams();
                    body.append("targetSheet", this.config.targetSheet);
                    for (let key in payload) {
                        if (key === 'dokumenList') {
                            body.append(key, JSON.stringify(payload[key]));
                        } else if (payload[key]) {
                            body.append(key, payload[key]);
                        }
                    }
                    await fetch(this.config.scriptUrl, { method: 'POST', body: body, mode: 'no-cors' });
                }
            }
        }
    </script>
</body>
</html>
