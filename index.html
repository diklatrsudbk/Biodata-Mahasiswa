<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 p-5" x-data="formHandler()">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-5 text-blue-600" x-text="'Pendaftaran ' + config.targetSheet"></h2>

        <form @submit.prevent="submitData">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 p-4 bg-blue-50 rounded">
                <div>
                    <label class="block font-semibold">Bagian</label>
                    <select x-model="formData.bagian" class="w-full border p-2 rounded" required>
                        <option value="">-- Pilih Bagian --</option>
                        <option value="Pelayanan Medik">Pelayanan Medik</option>
                        <option value="Penunjang Medik">Penunjang Medik</option>
                        <option value="Umur">Umum</option>
                    </select>
                </div>
                <div>
                    <label class="block font-semibold">Tipe Pendaftaran</label>
                    <select x-model="formData.tipe" class="w-full border p-2 rounded" required>
                        <option value="Perorangan">Perorangan / Mandiri</option>
                        <option value="Kelompok">Kelompok</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <h3 class="font-bold border-b mb-3">Data Institusi</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" x-model="formData.namaInstitusi" placeholder="Nama Institusi (Suggest)" class="border p-2 rounded" required>
                    <input type="text" x-model="formData.jurusan" placeholder="Jurusan (Suggest)" class="border p-2 rounded" required>
                    <select x-model="formData.jenjangPendidikan" class="border p-2 rounded" required>
                        <option value="">-- Jenjang --</option>
                        <option>SMA/SMK</option><option>D3</option><option>D4</option><option>S1</option><option>S2</option><option>S3</option><option>Profesi</option>
                    </select>
                </div>
            </div>

            <template x-if="formData.tipe === 'Perorangan'">
                <div class="space-y-4">
                    <h3 class="font-bold border-b">Biodata Peserta</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" x-model="formData.nama" placeholder="Nama Lengkap" class="border p-2 rounded" required>
                        <input type="text" x-model="formData.nim" placeholder="NIM" class="border p-2 rounded" required>
                        <input type="date" x-model="formData.tanggalLahir" @change="validateAge" class="border p-2 rounded" required>
                        <select x-model="formData.jenisKelamin" class="border p-2 rounded" required>
                            <option value="">-- Jenis Kelamin --</option>
                            <option>Laki-Laki</option><option>Perempuan</option>
                        </select>
                    </div>
                </div>
            </template>

            <template x-if="formData.tipe === 'Kelompok'">
                <div class="mt-6">
                    <h3 class="font-bold border-b mb-3">Daftar Anggota Kelompok</h3>
                    <table class="w-full border-collapse border text-sm">
                        <thead>
                            <tr class="bg-gray-200">
                                <th class="border p-2">Nama</th>
                                <th class="border p-2">NIM</th>
                                <th class="border p-2">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(mhs, index) in anggotaKelompok" :key="index">
                                <tr>
                                    <td class="border p-2"><input type="text" x-model="mhs.nama" class="w-full"></td>
                                    <td class="border p-2"><input type="text" x-model="mhs.nim" class="w-full"></td>
                                    <td class="border p-2 text-center">
                                        <button type="button" @click="removeAnggota(index)" class="text-red-500">Hapus</button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                    <button type="button" @click="addAnggota" class="mt-2 bg-green-500 text-white px-3 py-1 rounded text-xs">+ Tambah Anggota</button>
                </div>
            </template>

            <div class="mt-8 p-4 bg-gray-50 rounded">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm">Start Date</label>
                        <input type="date" x-model="formData.startDate" class="w-full border p-2 rounded" required>
                    </div>
                    <div>
                        <label class="block text-sm">End Date</label>
                        <input type="date" x-model="formData.endDate" @change="validateDate" class="w-full border p-2 rounded" required>
                    </div>
                </div>
                <button type="submit" class="w-full mt-6 bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700" :disabled="loading">
                    <span x-show="!loading">SUBMIT DATA</span>
                    <span x-show="loading">Memproses... Mohon Tunggu</span>
                </button>
            </div>
        </form>
    </div>

    <script>
        function formHandler() {
            return {
                // KODE YANG PERLU ANDA GANTI SETIAP GELOMBANG
                config: {
                    targetSheet: "GEL5", // Ganti ke GEL6, GEL7 dsb
                    scriptUrl: "https://script.google.com/macros/s/AKfycby2o_XXEpjdh14jRQ3ScFWesbMGtAyN0hDCW00FO1u65EhHLTg-PpXlGXkrv57U4At0/exec" 
                },
                
                loading: false,
                formData: {
                    tipe: 'Perorangan',
                    bagian: '',
                    namaInstitusi: '',
                    jurusan: '',
                    startDate: '',
                    endDate: '',
                    // ... sisanya otomatis terisi
                },
                anggotaKelompok: [{ nama: '', nim: '' }],

                addAnggota() { this.anggotaKelompok.push({ nama: '', nim: '' }) },
                removeAnggota(index) { this.anggotaKelompok.splice(index, 1) },

                validateAge() {
                    const birth = new Date(this.formData.tanggalLahir);
                    const age = new Date().getFullYear() - birth.getFullYear();
                    if (age < 14) {
                        alert("Umur minimal harus 14 tahun!");
                        this.formData.tanggalLahir = '';
                    }
                },

                validateDate() {
                    if (new Date(this.formData.startDate) > new Date(this.formData.endDate)) {
                        alert("Start Date tidak boleh lebih besar dari End Date!");
                        this.formData.endDate = '';
                    }
                },

                async submitData() {
                    this.loading = true;
                    
                    // Persiapan pengiriman data ke Apps Script
                    const finalData = new URLSearchParams();
                    finalData.append("targetSheet", this.config.targetSheet);
                    
                    // Mapping semua field formData ke URLSearchParams
                    for (let key in this.formData) {
                        finalData.append(key, this.formData[key]);
                    }

                    // Jika kelompok, kita bisa modifikasi alurnya di sini (looping pengiriman)
                    // Untuk sekarang kita test satu data dulu
                    try {
                        const resp = await fetch(this.config.scriptUrl, {
                            method: 'POST',
                            body: finalData,
                            mode: 'no-cors' // Penting untuk Apps Script
                        });
                        alert("Data sedang dikirim! Silakan cek Spreadsheet beberapa saat lagi.");
                    } catch (e) {
                        alert("Error: " + e);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
