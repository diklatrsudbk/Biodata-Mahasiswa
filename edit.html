<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit/Delete Data Peserta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .card-custom { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" style="max-width: 700px;">
    <div class="card-custom">
        <h3 class="text-primary fw-bold mb-4">⚙️ Edit / Delete Data</h3>
        
        <div id="searchArea">
            <div class="input-group mb-3">
                <input type="text" id="searchNim" class="form-control" placeholder="Masukkan NIM Peserta...">
                <button class="btn btn-primary" onclick="cariData()">Cari Data</button>
            </div>
            <small class="text-muted text-center d-block">Data akan dicari berdasarkan NIM yang terdaftar di Spreadsheet.</small>
        </div>

        <div id="editFormArea" class="hidden mt-4">
            <hr>
            <form id="formEdit">
                <input type="hidden" id="old_nim"> <div class="mb-3">
                    <label class="form-label fw-bold">Nama Lengkap</label>
                    <input type="text" id="edit_nama" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">NIM</label>
                    <input type="text" id="edit_nim" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Sekolah/Universitas</label>
                    <input type="text" id="edit_sekolah" class="form-control" required>
                </div>
                
                <div class="d-flex justify-content-between mt-4">
                    <button type="button" class="btn btn-danger" onclick="prosesAksi('delete')">🗑️ HAPUS DATA</button>
                    <div>
                        <button type="button" class="btn btn-secondary" onclick="location.reload()">Batal</button>
                        <button type="button" class="btn btn-success fw-bold" onclick="prosesAksi('update')">💾 SIMPAN PERUBAHAN</button>
                    </div>
                </div>
            </form>
        </div>
        
        <div class="mt-4 text-center">
            <a href="index.html" class="btn btn-link text-decoration-none">← Kembali ke Beranda</a>
        </div>
    </div>
</div>

<script>
    // URL Web App GAS Anda (Gunakan URL yang sama dengan index.html)
    const scriptURL = 'URL_WEB_APP_ANDA_DISINI';

    async function cariData() {
        const nim = document.getElementById('searchNim').value;
        if(!nim) return alert("Masukkan NIM!");

        // Beri loading sederhana
        const btn = document.querySelector('#searchArea button');
        btn.disabled = true; btn.innerText = "Mencari...";

        try {
            // Kita kirim request GET ke GAS dengan parameter nim
            const response = await fetch(`${scriptURL}?action=read&nim=${nim}`);
            const data = await response.json();

            if(data.status === "error") {
                alert("Data tidak ditemukan!");
            } else {
                // Isi form dengan data dari spreadsheet
                document.getElementById('old_nim').value = data.nim;
                document.getElementById('edit_nama').value = data.nama;
                document.getElementById('edit_nim').value = data.nim;
                document.getElementById('edit_sekolah').value = data.sekolah;
                
                document.getElementById('editFormArea').classList.remove('hidden');
                document.getElementById('searchArea').classList.add('hidden');
            }
        } catch (e) {
            alert("Terjadi kesalahan koneksi.");
        } finally {
            btn.disabled = false; btn.innerText = "Cari Data";
        }
    }

    async function prosesAksi(tipe) {
        if(tipe === 'delete' && !confirm("Yakin ingin menghapus data ini?")) return;

        const formData = new FormData();
        formData.append('action', tipe);
        formData.append('old_nim', document.getElementById('old_nim').value);
        formData.append('nama', document.getElementById('edit_nama').value);
        formData.append('nim', document.getElementById('edit_nim').value);
        formData.append('sekolah', document.getElementById('edit_sekolah').value);

        try {
            const response = await fetch(scriptURL, { method: 'POST', body: formData });
            const result = await response.text();
            alert(result);
            location.reload(); // Refresh halaman
        } catch (e) {
            alert("Gagal memproses data.");
        }
    }
</script>
</body>
</html>
