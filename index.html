<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Biodata Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 30px; padding-bottom: 50px; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-title { color: #0d6efd; margin-bottom: 25px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 form-container">
            <h2 class="header-title">Biodata Mahasiswa</h2>
            
            <form id="biodataForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" name="nama" class="form-control" placeholder="Nama sesuai KTP" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">No. KTP</label>
                        <input type="number" name="ktp" class="form-control" placeholder="16 Digit NIK" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Alamat Lengkap</label>
                    <textarea name="alamat" class="form-control" rows="2" required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Kelurahan/Kecamatan</label>
                        <input type="text" name="kec_kel" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Kota</label>
                        <input type="text" name="kota" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tempat Lahir</label>
                        <input type="text" name="tempat_lahir" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tanggal Lahir</label>
                        <input type="date" name="tgl_lahir" id="tgl_lahir" class="form-control" required onchange="hitungUmur()">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Umur</label>
                        <input type="text" name="umur" id="umur" class="form-control" readonly placeholder="Otomatis...">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Handphone (WA)</label>
                        <input type="tel" name="hp" class="form-control" placeholder="0812..." required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Jenis Kelamin</label>
                        <select name="jk" class="form-select" required>
                            <option value="">Pilih...</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Agama</label>
                        <select name="agama" class="form-select" required>
                            <option value="">Pilih Agama...</option>
                            <option value="Islam">Islam</option>
                            <option value="Kristen Protestan">Kristen Protestan</option>
                            <option value="Katolik">Katolik</option>
                            <option value="Hindu">Hindu</option>
                            <option value="Buddha">Buddha</option>
                            <option value="Konghucu">Konghucu</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Jenis</label>
                        <select name="jenis" class="form-select" required>
                            <option value="">Pilih Jenis...</option>
                            <option value="Penelitian">Penelitian</option>
                            <option value="Magang">Magang</option>
                            <option value="PKL">PKL</option>
                            <option value="Studi Banding">Studi Banding</option>
                            <option value="Orientasi Program">Orientasi Program</option>
                        </select>
                    </div>
                </div>

                <hr>
                <h5 class="mb-3">Data Pendidikan</h5>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Jenjang</label>
                        <select name="jenjang" class="form-select" required>
                            <option value="">Pilih Jenjang...</option>
                            <option value="SMK/SMA">SMK/SMA</option>
                            <option value="D3">D3</option>
                            <option value="S1">S1</option>
                            <option value="S2">S2</option>
                            <option value="S3">S3</option>
                        </select>
                    </div>
                    <div class="col-md-8 mb-3">
                        <label class="form-label">Nama Sekolah / Universitas</label>
                        <input type="text" name="sekolah" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Jurusan</label>
                        <input type="text" name="jurusan" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">NIM</label>
                        <input type="text" name="nim" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" name="start_date" id="start_date" class="form-control" required onchange="validasiTanggal()">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">End Date</label>
                        <input type="date" name="end_date" id="end_date" class="form-control" required onchange="validasiTanggal()">
                    </div>
                </div>
                <div class="mb-3">
    <label class="form-label">Tipe Pendaftaran</label>
    <select name="tipe" class="form-select" required>
        <option value="">Pilih Tipe...</option>
        <option value="Perorangan/Mandiri">Perorangan/Mandiri</option>
        <option value="Kelompok">Kelompok</option>
    </select>
</div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary w-100 p-3" id="submitBtn">Simpan Biodata</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzdW9MIRkMIxfpYnsgXrkEakDABx20Vc_PdTzgffPvkD2Z9hykqPbYnPCM3Jrc7fzOm/exec'
    const form = document.getElementById('biodataForm')
    const btn = document.getElementById('submitBtn')

    form.addEventListener('submit', e => {
        e.preventDefault()
        
        // Proteksi ganda untuk tanggal
        const start = new Date(document.getElementById('start_date').value);
        const end = new Date(document.getElementById('end_date').value);
        if (end < start) {
            alert("Kesalahan: End Date tidak boleh lebih kecil dari Start Date.");
            return;
        }

        btn.disabled = true
        btn.innerHTML = "Sedang Mengirim..."

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
            btn.disabled = false
            btn.innerHTML = "Simpan Biodata"
            alert("Terima kasih! Data biodata berhasil tersimpan.")
            form.reset()
            document.getElementById('umur').value = ""; 
        })
        .catch(error => {
            btn.disabled = false
            btn.innerHTML = "Simpan Biodata"
            alert("Terjadi kesalahan: " + error.message)
        })
    })

    function hitungUmur() {
        const inputTgl = document.getElementById('tgl_lahir').value;
        if (!inputTgl) return;

        const tglLahir = new Date(inputTgl);
        const hariIni = new Date();
        
        let tahun = hariIni.getFullYear() - tglLahir.getFullYear();
        let bulan = hariIni.getMonth() - tglLahir.getMonth();
        let hari = hariIni.getDate() - tglLahir.getDate();

        if (bulan < 0 || (bulan === 0 && hari < 0)) {
            tahun--;
            bulan = (bulan < 0) ? 12 + bulan : 11;
        }
        
        document.getElementById('umur').value = (tahun < 0) ? "Tanggal tidak valid" : tahun + " Tahun " + bulan + " Bulan";
    }

    function validasiTanggal() {
        const startVal = document.getElementById('start_date').value;
        const endVal = document.getElementById('end_date').value;

        if (startVal && endVal) {
            if (new Date(endVal) < new Date(startVal)) {
                alert("Peringatan: End Date tidak boleh lebih awal dari Start Date!");
                document.getElementById('end_date').value = ""; 
            }
        }
    }
</script>

</body>
</html>
